body:
  text: 卷之二痢瀉第二十七治痢瀉初起即以細茶生薑各三錢水二鍾煎至八分服之重者各五錢煎服即止不愈再服治赤白痢用薺菜根葉燒灰湯調下極妙治熱痢不止用蛤蟆衣草葉搗汁一盞入蜜半盞煎溫分二服或用蛤蟆衣草子炒香熟為末米飲調下治諸痢以艾葉陳皮煎湯服治腸滑久痢以石榴劈破扊簇燒令煙盡急取出不令作白灰用碗蓋地上一宿為末以酸石榴一片水一鍾煎湯服二錢亦治泄瀉治白痢腹痛用雜草燒鑊鏽五錢為末熱酒調食前服治血痢用鹽梅去核研一枚合茶湯加醋服之又方罌粟花未開時外有兩片青葉包之花開即落地收取陰乾患赤白痢垂死者研為細末米飲調下一錢神效治噤口痢湯飲米穀不下者用蓮子去殼留紅皮及心為細末用井花水調下每服二錢或三錢日進二服見效又方纍試纍驗用黃連三錢人參一錢五分水一鍾半煎至七分溫服藥入口即蘇又方名芎粟散用川芎罌粟去蒂各一兩共為細末每服八分空心蜜湯調下又方用蓮肉去皮炒為末每服一錢空心米飲調下治休息痢及疳瀉用雞子一枚打破用黃蠟一塊如指大熔化以雞子拌和炒熟空心食之治泄瀉用五倍子為末白湯調服又方用生薑二塊艾葉一把水煎服治暴瀉不止小便不通用車前子炒為末每服二錢米飲調下其根葉亦可搗汁服治水瀉用獖豬肚一枚淨洗去脂膜入大蒜在內自晨至晚以肚蒜糜爛為度杵成膏子入平胃散同杵丸如梧桐子大每服三十丸鹽湯或米湯空心服又方用生薑一塊去皮破作兩片刮去姜心納白礬塞滿以紙包火中煨令乾熟取出以盞合地下一宿出火氣卻以百沸湯半鍾冷水半鐘相和謂之陰陽水將姜細嚼此水送下又方以大蒜搗爛貼臍下並腳心立止又方用槐花一合炒熟為末米飲下面第二十八治面黑痣用江米十粒半夏五分共為細末用水調成膏子少許用鑽尖挑在黑痣頭上待乾剝去黑皮如有黑再照前點如無再不必點又方用黃瓜割開去瓤入皮硝於瓜內填滿外以繩密縛周固懸於無日風吹之處下以盆盛之瓜內水流入盆內塗於痣上或以新瓷碗盤角鋒略去痣上浮皮以前水塗之皆效治雀子斑用霜梅肉櫻桃枝豬牙皂角紫背浮萍各等分研為細末如常洗面其斑自去治面上瘡用好白芷一味為末好酒調塗瘡上待乾以井水潤濕之掃去再塗新者連易三四次即愈眼第二十九治眼目赤腫翳痛用鯉魚膽點之亦治雀盲治兩目暴赤用長流水煎鹽湯二碗飲後以雞翎於咽喉中探引吐之又以草莖於鼻中探出血即愈治赤眼用甘草水磨明礬敷眼胞上痛即止治風赤眼用蚯蚓十條炙乾搗為末臨臥時以冷茶調下二錢又方用蛤蟆衣草洗淨搗爛攤向眼上帛系之頃時即瘥治赤眼疼痛用薺菜根搗汁點眼中又方用冬青葉洗淨入鹽少許濃煎乘熱洗之又方以自己小便洗眼效又方用水浸黑豆至夜連皮研細盦眼上睡或用豆腐貼睡亦佳治小兒赤眼用黃連為末水調貼腳心赤眼自退治眼腫痛用生薑自然汁調飛過白礬貼眼胞痛即止又方用青鹽火煅以碗合地上出火氣研細每用半錢熱湯者一盞泡溫洗爛眼及拳毛倒睫效治冷淚目昏用乾薑肥者為末每用一字沸湯點洗或用貝母一枚膩白者胡椒七粒為末點之治眼癢多因布巾拭破眼眶致成爛眩風不得幹好用白礬一兩銅青一兩同研細和勻每用半餞熱湯半盞泡澄清以手蘸開眼如法洗必澀不可拭乾但閉目坐得澀止自開眼如藥冷將紙蓋盞面於湯瓶上頓溫又洗一日洗四五次治眼翳膜久年不散每日三次以舌舐其膜漸漸下緣人真氣使然治眼生花及翳用刀刮指甲細屑和乳汁點翳上即退治眼青盲以豬膽五枚取汁於銅器中慢火煎令可丸即丸如黍米大納眼中驗治眼中胬肉用杏仁十四枚去皮尖生嚼吐於手心乘暖以綿纏箸頭點胬肉上不過三四度即瘥治諸眼疾夜含蘿蔔一片數次易之收諸毒氣又方用野菊花作枕頭能明目又方用羊膽一枚入蜜一錢在內線扎砂鍋內滿入水煮熟冷水內浸取出候乾傾入瓷罐內以箸點眼四角效治時行害眼並風眼有淚者用皮硝六錢水一鍾煎七分候冷定洗眼每日洗數次眼如童子明每一月煎一遍治物入眼中用好墨清水研箸點即出又方飛絲入眼用新筆於眼內運攪即收在筆上耳第三十治耳聾用鼠膽汁滴入耳中又方用樓子蔥尖插耳中又方用九節菖蒲末萆麻子為膏綿裹塞耳中又方用蚯蚓三條鹽少許貯在蔥葉中自化為水滴入耳中三五日即瘥又方用萆麻子五十個去皮與熟棗一枚同搗更入乳汁丸如棗核大每用一丸綿裹納於聾耳內覺熱為度一日一換如藥難丸日中曬少時又方口噙甘草一枚耳中塞二塊立效治耳痛用鱔魚血數點入耳內便愈又方用白鹽炒熱重綿包尉又方用杏仁炒焦研細以綿裹塞耳治底耳以枯白礬為末填耳中立效治停耳膿血不止用白礬燒灰吹入耳或以蚯蚓干為末吹入耳又方用青橘皮燒灰研細為末用綿裹塞耳日換三四次治耳瘡腫痛用五倍子為末水調塗如有水干糝之治百蟲入耳用兩刀於耳邊相磨戛作聲即出又方用甕器於耳邊敲作聲即出又方用麻油灌之即出又方用桃葉挼細塞耳自出或以藍青研汁滴耳中又方用蔥涕灌耳中蟲即出亦治耳聾治蜒蝣入耳用貓尿灌耳立出取貓尿用盆盛貓以生薑擦牙治蒼蠅入耳用皂角子研爛用生鱔魚血灌耳中治蟻子入耳用豬精肉一指火炙令香置耳孔邊即出治蜈蚣入耳用生薑汁或韭汁灌耳自出或以熟雞肉一塊置耳孔邊自出治物入耳中不可出以麻繩剪一頭散溶牛膠在上探入耳中使其物黏之徐徐引出效水入耳中薄荷汁點之效治黃豆入耳中用鵝翎管截長一二寸許去其中膜留少許於一頭以有膜之頭入耳中口氣吸即出口第三十一治口瘡用白礬一兩鐵勺內火熬汁干黃丹一兩炒紅色放下紫色為末糝瘡上又方用宿砂火煅為末糝瘡上或用蓮花片貼之效又方用乾薑黃連各等分為末糝之吐出涎水立效又方用生薑自然汁漱口數次涎出效又方用吳茱萸為末醋調塗足心效最宜小兒口瘡不肯服藥者一帖而愈又方以白礬為末湯化濯足或以五倍子為末糝之治口唇生瘡取陳壁上土細研敷之治口唇緊小不能開合不能飲食不治即死用白布作燈炷如指大安斧刀上燃燒令刀上汗出拭取敷唇上日二三度或用舊青布燒灰酒調服或和豬脂塗敷又以蛇蛻燒灰先拭淨敷之又以蠐螬蟲燒灰豬脂調敷又燒亂髮蜂房六畜毛灰用豬脂調敷又馬齒莧煮汁洗之治唇緊燥裂生瘡用橄欖不拘多少燒灰豬脂和塗患處舌第三十二治舌強腫如豬胞以針刺舌下兩邊大脈血出即消勿刺著中央脈令人血不止則以火燒銅箸烙之或以雜草燒鑊鏽醋調敷舌上下脫去再敷須臾而消此患人多不識失治則死凡舌腫舌下必有蟲狀如螻蛄臥蠶有頭有尾頭小白可燒鐵釘烙頭上即消又方用䤵針磨令極尖輕刺之日刺八九次血出盡痛減腫消治舌忽脹出口外用雄雞冠刺血以盞盛浸舌就咽下即縮治重舌用鏽鎖燒紅打下鐵鏽為末水調一盞噙之又方用灶中心對鍋底土酒調塗舌上用黃丹如豆大安舌下治舌無故出血以炒槐花為末糝之愈又方用亂髮燒灰水調一錢服治飲酒過多咽喉爛舌生瘡用水中田螺蛘肉以蔥豉姜椒煮汁飲三盞效牙第三十三治牙疼用白楊樹皮為末每服三錢熱酒調含之漱灌或以枯白礬熱水漱之又方用蜂房一枚以盞盛孔內以火燒研末擦牙痛處鹽水漱吐之又方用蛤蟆頭上白汁塗綿上陰乾以米粒許塞牙縫牙根腫者須針刺出血又方因紅豆研少許吹鼻中又方用野芫荽略捻動塞鼻中又方用霜殺老絲瓜燒存性為末擦痛處立止又方因蛀竹屑陳皮各一兩烏梅肉研如泥敷疼處又方用肥皂一個去瓤內入山賴甘松各三分花椒鹽不拘多少以塞肥皂滿為度外用麵包裹煉紅取出研為細末每日擦漱風蟲牙痛俱止又方治牙風痛用豬牙皂角一個於門檻上砍作兩截以酸醋一盞煎滾候溫漱之神效治蟲蛀牙痛用韭菜連根淨洗爛搗同人家地板上泥和勻納痛處蛀孔內又將紙貼痛處腮上二時取下細細蟲見於泥上可除病根又方治蟲牙痛不可忍名一笑散用椒目為末以巴豆一粒研成膏飯丸如蛀孔大綿裹安於蛀孔內昔有樂清子患此號呼之聲徹於四鄰諸藥不效用此愈治牙熱癰腫痛出血用柳枝扎碎二碗槐枝扎碎二碗鹽一碗加青鹽二兩井水八碗鍋內煎乾炒燥碾為細末擦上又方用旱蓮草搗汁和鹽煎成餅又碾為細末每日擦漱服之又方治齒齦出血用白礬一兩燒研為末每用半錢敷齒根下齒中出血煎淡竹葉湯頻漱之又方用當歸極大者一根去頭尾入竹筒內周圍用白鹽填實用紙塞口炭火燒存性為末擦牙洗眼津咽下又烏鬚髮又方以瀝青研細擦牙堅牢損傷第三十四治刀斧傷用石灰包裹定痛止血立瘥又方用五月五日採露草一百種陰乾燒作灰與石灰等分以井花水和丸燒白刮敷瘡上止血生肌又方用葵葉燒灰或干葉為末皆可敷又方用琥珀屑敷之止血生肌瘡口即合又方用蟹黃及足中肉熬末內瘡中筋斷亦可續又方用晚蠶蛾為末糝上白絹裹止血生肌隨手瘡合又方用大黃石灰等分為末一敷即效或炒為粉紅色敷又方用桑柴灰敷又方用白芍藥一兩炒黃為末酒調二錢服或米飲調亦止痛又方用緑豆粉新鐵𬫄內炒紫色用新汲井水調稀厚勻敷損處貼以紙將杉木片縛立效治打撲有傷瘀血流注用半夏為末調敷傷處一宿不見痕效治瘀血流注紫黑或傷眼上紫黑用大黃為末以薑汁調敷一夜一次上藥一宿黑者紫二宿紫者白矣治從高墜下及墜馬傷損取淨土和醋蒸熱布裹尉之斯須痛止治攧撲有傷口嚼燈心罨之血即止或用冬青葉曬乾為末糝傷處或細嚼敷上或用薑汁和酒等分拌生面貼之或以桑根白皮搗汁擦之或用霜梅捶碎罨瘡口免破傷風治破傷風用病人耳中膜並爪甲上刮末唾調敷瘡上立效治破傷風牙關口緊四肢強直用鷺鷥頭連尾燒作灰研以臘豬脂調敷治破傷風浮腫用蟬蛻為末蔥涎調敷破處即時去惡水立效或用魚膠一錢溶化封之又酒服一錢癰疽疔毒第三十五治癰疽發背惡瘡腫毒初生及毒蛇瘋犬所傷用大蒜切片子如錢厚安腫上以艾炙之蒜熟更換新者初炙覺痛炙至不痛即止初炙不痛炙至極痛乃止又方治發背用榆樹一名舊柳樹根皮切碎清水泡洗搗極爛和香油遍敷患處只留瘡頭出氣若藥干拘急用苦茶濕潤藥不黏更換新者將愈用桑葉嚼斷筋隨大小貼患處漸收漸小口合乃止神效又方治癰疽發背用大薊根俗謂之野紅花其葉似苦蕒但其葉出尖處有針刺四五月間開花不拘多少淨洗切碎研如膏塗瘡上其冷如冰初發者能消散已成者速潰又方用牛皮膠二兩酒二升同煮候牛皮膠溶化放溫令病者徐徐飲盡如未結成即消已結成即易潰已潰即易瘥如未效再服必效矣治癰疽不消已成膿不得破用蠶繭出過蛾兒空殼一個燒灰酒調服即穿又方治腫毒未破用蛤蟆一個先炒石灰後用蛤蟆剁碎和炒灰研如泥用帛攤上貼患處自破治一切癰疽及婦人乳癰初發時用鷺鷥藤捶碎不犯鐵器大甘草節一兩各生用水二碗慢火煎一碗入無灰酒一大碗再煎十數沸去渣分三次溫服如無生者用乾者終力淺更取生葉一把擂爛入酒少許調稀稠得所敷瘡四面中心留一口泄毒氣大有神效又方以黃蜀葵花用鹽糝放入瓷器內密封經年不壞每用敷患處無花根葉皆可又方治癰疽發背初發腫作便以紙一片水浸濕搭腫上視其上一點先乾者即是正頂先以水和麵作圈安於正頂上卻用大馬蜞一條一名螞蟥安於中頻以冷水灌之馬蜞當吮其穴膿血出毒即散如毒大蜞小須用三四條方見功若吮著正穴蜞必死用水救活其瘡即愈纍試奇效血不止以藕節研爛塗止之茅草花亦好又方治癰疽發背瘰癧疔瘡漏瘡衛護心膜驅解諸毒自然內消用徹明礬生用二兩為末黃蠟一兩二錢溶汁就爐上入礬拌和衆手丸如梧桐子大每服十五丸溫錢或冷酒常服之或以枯白礬炒鹽等分細研每服一黃新水調瘡未回再服瘡回覺痛即止漏瘡用雞肫內水皮為末塞孔治附骨疽久不瘥膿汁敗壞或骨從瘡孔出用大蛤蟆一個切碎亂頭髮一握如雞子大豬油四兩以豬油煎前藥濾去渣如膏先以桑根皮烏豆煎湯洗拭乾煅龍骨末糝瘡四畔令易收斂卻用膏貼之治坐馬癰用紡車弦瓣繩紡乏者燒灰敷治便癰用皂角不蛀者燒過陰乾為末酒調服或用皂莢子十粒水服之又用皂莢炒焦小粉炒等分和勻以熱醋調仍以紙攤貼患處頻頻水潤之效又方用胡桃仁七個燒過陰乾為末酒調服之不過三服或用生蜜米粉調服休吃飯利小便效治男子陰頭癰用鱉甲為末雞子清調敷治疔瘡用蒼耳子根梗苗但取一色燒灰和醋澱如泥塗干再換上不過十次即拔出根又方用生蜜與隔年蔥一處研成膏先將瘡周圍以竹錍刺破然後用藥於瘡上攤之用緋帛蓋覆如人行二十里覺疔出然後以熱醋湯洗之又方用白梅肉荔枝肉同搗成膏捻作餅子依瘡大小安上根即除又方治疔瘡垂死者用甘菊花葉一把搗汁一盞入口即活冬月用根此方神效又方用蟬蛻殭蠶為末酸醋調塗四畔留瘡口根出稍長然後拔去再用藥塗瘡上又方取蟾酥以白麵黃丹搜作劑丸如麥粒狀用指甲扯動瘡上插入重者針破患處以一粒納入仍以水沉膏貼之取蟾酥法用癩虼蚾即蛤蟆於眉刺破把手按出酥於油紙上或桑葉上然後插在背陰經宿則自乾白於鵝翎筒內盛之水沉膏法用白芨末半錢水盞內沉下澄去水卻於皮紙上攤開貼瘡上治魚臍疔瘡用絲瓜葉連須蔥韭菜同入石鉢內搗爛如洗以酒和服初貼腋下如病在左手貼左腋下在右手貼右腋下在左足貼左胯在右足貼右胯在中則貼心臍並用帛包住候向下紅絲皆白則愈如有潮熱亦用此法卻令人抱住恐其顫倒則難救矣又方治魚臍瘡頭黑皮破黃水出四畔浮漿用蛇蛻燒存性細研雞子清調敷諸瘡第三十六治瘰癧用萆麻子炒熟去皮爛嚼臨睡服三二枚漸加至十數枚甚效又方將臘月貓屎用新瓦二片合在內外用鹽泥封固燒成灰以少油調塗瘡口上又方治瘰癧已潰未潰用蝸牛不拘多少以竹絲串尾上曬乾燒存性入輕粉少許豬骨髓調用紙花量瘡大小貼之一法以帶殼蝸牛七個生取肉入丁香七粒於殼內燒存性與肉同研成膏用紙花貼之又方用大田螺並殼肉燒存性為末破者干貼未破者清油調敷又方用不蛀皂莢不拘多少每三十條作一束以棕櫚裹之縛定於冷糞缸內浸一月取出卻於長流水內再浸一月死水不能浣洗不可用去棕櫚曬乾不得焙搗為末每一兩入麝香半錢全蠍七個研細拌勻每服一二錢溫酒或飲湯調下又方用乾薑不拘多少為末用薑汁打糊和作劑子用黃丹為衣每日一次隨瘡大小入藥在內追膿盡生肉為度瘡口合則已如瘡口不斂用大黃末以蔥白汁調搽即愈仍日服十宣內托散二服如瘡腫不破者用野菊花擂爛煎溫服仍將菊花根為末貼瘡上自消或不消瘡口亦自破依前用藥劑又方以手仰置肩上微舉肘取之肘骨尖上是穴隨患處左即灸左右即灸右艾炷如小箸頭大再灸如前不過三次永無恙所感稍深三灸平安又方以蒜片貼著癧上灸七壯如蒜熟易蒜多灸取效治項後生疙疽不論大小及日月深遠或有赤硬腫痛用生山藥一挺去皮萆麻子二個研勻攤帛上貼之如神效治瘤贅凡皮膚或頭上生瘤大者如拳小者如栗或軟或硬不疼不痛者用天南星一枚細研稠黏用米醋五七滴為膏如無生者用乾者為末醋調如膏先將小針刺患處令氣透卻以藥膏攤紙上象瘤大小貼之又方治瘤贅兼去鼠奶痔用芫花根淨洗帶濕不得犯鐵器於木石器中搗取汁用線一條浸半日或一宿以線系瘤經宿即落如未落再換一二次自落後以龍骨訶子末敷瘡口即合用之纍效如無根只用花泡濃水以浸線又方用蜘蛛絲勒瘤子根三二日自然退落治反花瘤用馬齒莧一斤燒灰研細豬脂調敷治臁瘡用黃蠟煉攤冬青葉上貼縛定日周又換一葉至七日換七葉愈又方用黃蠟熔化油紙攤成膏藥十二個半日一換換時以先貼者加其上不待盡而愈又方用韭菜地上蚯蚓泥干為末入輕粉清油調敷又方用白墡土不拘多少火煅通赤研細生油好粉調塗或用真百藥煎填之或以五倍子末糝之亦妙治冷臁瘡用鹿角灰發灰乳香為末清油調敷又方治臁瘡成臼纍月不幹用上等好砂糖先用鹽湯淋洗後絹帛拭乾以津唾塗卻以此敷上三日愈治外臁生瘡臭穢潰爛數年不愈者用生龜一個烏者打死去肉取殼酸醋一碗炙醋盡為度仍煅令白煙盡須存性碗合地上一宿出火氣入輕粉麝香拌勻先以蔥湯洗拭乾方用藥敷治腳脛骨上生瘡久爛黑或發孔或臭穢不可近用蜒蝣十條小竹籤穿定瓦上焙乾為末真清油調敷神效又方用多年老杉木節燒灰真清油調箬葉盛隔貼瘡上以絹帛扎定不數貼而愈治腳肚生瘡初如粟米漸大爪搔不已成餅包腳相交黃水出癢不可忍久疾難愈用百藥煎研細津咽調逐遭塗敷自外而入先以貫仲煎湯淋洗後用藥又方用石榴皮濃煎稍冷掃瘡上冷如冰即成痂又方用鱔魚一條黃色者先將打死卻用清油塗其腹下置瘡上盤屈令遍用帛絹系定食頃覺瘡痛不可忍然後取鱔魚腹下有竅如針眼大皆蟲也如未盡再用一條依前再縛蟲去盡卻用死人腳脛骨燒灰清油調敷或以骨灰一兩入好茶末二錢同調亦可又方治足上瘡臭穢潰爛用藍子一枚燒為末入膩粉少許井水調塗效又方治臁瘡並搭手發背等瘡用蔥白一斤石灰二斤馬齒莧一斤三味濕搗同團陰乾為末貼瘡上效治一切腫毒初生用苧根蔥頭生薑炒小粉赤豆同搗碎頓熱罨上冷再換又方治卒得惡瘡不識者用桃皮為末納瘡中又方治腫毒無頭者用蛇蛻貼於腫處治惡瘡無頭用皂角刺燒灰陰乾為末酒調三錢嚼葵菜子三五粒送下治一切惡瘡不收口用瓦松不拘多少陰乾為末先用槐枝蔥白湯洗過糝之立效炙瘡久不收者更效治諸惡瘡中新胬肉出用烏梅肉蜜和搗作餅子如錢厚貼瘡上治諸瘡因度水腫者用生白礬末水調塗之自消治一切腫毒瘡用臘桑葉為末以新汲水調塗之如有膿干糝在上如在腳膝敷了用帛裹之治多年惡瘡用冬瓜葉陰乾瓦上焙研細糝瘡濕處或用多年石灰研細雞子清調成塊火煅過候冷再為末薑汁調敷或用枸杞根為末鹽洗淨干糝妙又方用馬齒莧搗爛敷之亦治翻花瘡其形如花開之狀燒灰豬脂調敷又方用雞腸草研細取汁敷其瘡以渣罨之或為末以豬脂調敷甚效又方以天茄葉貼之或為細末貼亦妙又方以蒲公英搗如泥貼一切惡瘡並蛇傷又方用野葡萄根紅者去粗皮為末新水調塗腫上頻掃新水治鬢邊生軟癤名髮鬢有數年不愈者用豬頸上毛貓頸上毛各一撮燒灰鼠屎一粒為末以清油調敷治遍身熱毒瘡痛而不癢手足尤甚黏著衣被夜不得睡用菖蒲為末多鋪於席上使病者恣臥其間仍以衣被覆之五七日愈疹瘡爛用艾鋪亦可治遍身癮疥疼痛用白姜蠶一兩炒黃色為末分四分酒調服又方用明礬朴硝為末井水調雞羽掃敷上又方用蠶沙以新水煎無風室內溫洗效治遍身白疹瘙癢不止用小枸橘不拘多少切作片麩皮炒黃為末每服二錢酒浸少時去枸橘但飲酒仍以枸橘煎湯洗患處妙治三十六種風結瘡用馬齒莧五斤黃蠟三兩水一鍋煎成膏敷上治五般瘡癬用韭根燒存性旋搗末豬脂調敷治諸瘡用韭菜不拘多少先燒熱湯以盆盛上用板蓋之留一竅卻以韭菜於湯內泡之以糞門坐竅上令氣蒸熏候溫用韭菜軟軟洗瘡數日自下或芫花煎洗治面上生瘡用枇杷葉布擦去毛炙乾為末食後茶湯調下二錢又方用鏊子底黑煤入於小油內以匕打成膏子攤在紙上貼之治人面卒得赤黑丹如疥狀不急治遍身即死用鹿龜燒灰豬脂和塗上治腮腫用赤小豆為末醋調敷之立效治人面瘡用貝母為末小蘆筒灌瘡口數日愈治疥瘡用豬肚二個放皂莢同煮熟去皂莢食之妙又方治善惡瘡疥或赤腫者用赤小豆四十九粒為末以苧根搗爛和之敷赤腫處及四旁落則再敷或用赤小豆銼散每服二錢水一盞煎服尤佳治火氣入瘡用黃柏皮為末糝之或薄荷煎塗亦可治白禿瘡用慈竹上蟲兒不拘多少研用牛尿調搽先洗剃去瘡靨後上藥又方用甜瓜蔓龍頭不拘多少河水浸一宿以砂鍋熬取極苦汁濾去瓜蔓以火熬成膏盛於瓷器中先剃頭去盡瘡痂使血出盡以河水洗淨卻用瓜蔓膏一盞加半夏末二錢生薑汁二匕狗膽一個同調敷不過二三次立愈忌豬魚動風之物又方用羊糞熬湯洗去痂屋懸煤炒為末油調敷瘡上又方用破舊硃紅漆器剝朱漆燒灰油粉調敷又方用鯽魚一個重三四兩者去腸肚以亂髮填滿濕紙裹燒存性雄黃二錢共為末清油調敷先以齏水洗拭後用藥又方治大人小兒禿瘡及惡瘡用苦楝皮燒灰以豬脂調敷治癬用午時取碗葉研汁敷之或用禿菜酸醋磨敷又方用䤵針磨令極尖快當癢時於癬上各刺百餘針血出盡煎鹽湯洗之未愈再針再洗治狗癬疹用柏油不拘多少鐵器內熬次下鵓鴿糞雞糞細末同和加香油少許擦之治紫白癜風用禿葉根同白礬五倍子無名異和醋搗碎先以苧麻刮熱以藥擦之三四次絶根又方治白紫癜風及諸風瘡癮疹名蒼耳丸五月五日割取蒼耳草葉洗淨曬乾為末煉蜜丸如梧桐子大每服十丸日三服若身體有風處或如麻豆粒此為風毒出也可以針刺黃汁出盡乃止又方用干浮萍四兩漢防己三錢同煎湯熱洗白癜風一切斑疹疥癬神效治艾火帶用白鱔泥炒研細香油調敷之又方雉雞毛及鵝毛燒灰敷之治下部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫用馬齒莧四兩研爛入青黛一兩再研勻敷上又方用紅椒開口者七粒連根蔥白七個同煮水洗淨用絹衣浥干即愈治陰癢汗出疼痛用生大豆嚼碎一日三四次敷上治陰瘡用桑樹根白皮搗汁洗之又方用胭脂緑豆粉同研勻敷之又方用臘茶五倍子等分膩粉少許敷之治陰囊上生瘡用甘草煎湯溫洗卻用臘茶末敷治陰頭生瘡用溪港中螺螄入乾鍋內煅過先以鹽水洗五十次後以此藥敷之治妒精瘡用大田螺兩個和殼煅過存性為末入輕粉搽患處即安治外腎生瘡用緑豆粉一分蚯蚓屎二分水研塗干又敷治腎臟風發瘡疥紅椒去目水浸半日和生杏仁研爛擦兩手掌掩外腎極效治下疳瘡用白礬一兩黃丹八錢熬飛紫色研為末以溝渠中惡水洗過拭乾敷上又方用五倍子為末以漿水洗干貼之治漏瘡惡水自大腸出用黑牽牛研細去皮細末一分入豬腰子內以線扎青荷葉包火煨熟細嚼溫鹽酒下治漏瘡肛門周匝有乳數十諸藥不效用熟犬肉蘸濃藍汁空心食之七日自安又方用信石新瓦上火煅為末以津液潤紙探子蘸少許捻入瘡孔內如瘡多不可齊上免使害人治久冷漏瘡用活鱔魚五六條擲地以竹針貫之覆瘡良久當有蟲出如線復之使盡用檳榔黃連末敷明日以干艾作湯投白礬三二錢洗不一月全愈治脫肛用鱉頭一枚燒煙盡為末敷肛門上就將舊麻鞋底按入即不出又方用槿樹葉煎湯熏洗後以生五倍子白礬等分為末敷上雜方第三十七治骨鯁用野苧根搗爛丸如龍眼大魚骨鯁魚湯化下雞骨鯁魚湯化下又方用威靈仙五錢縮砂三錢甘草二錢水一鍾煎至四分入口噙漱入喉呵氣即愈又方以橄欖食即下無則核搗為末用流水調下又方用獺爪於咽喉外爬之即下又方用穀樹子泡湯咽下骨自消又方用金鳳花子嚼爛噙下無子用根亦可又方用威靈仙根不拘多少以好米醋浸一二日曬乾為末醋糊為丸如梧桐子大每服一丸或二丸半茶半湯下如要吐用砂糖銅青為末半匕滴油一二點同茶湯調服即吐出原物如藥性來遲令患人兩手伏地用清水一盆以鵝翎口中攪探即吐又方治魚骨鯁用砂糖白炭皮末紫蘇葉滑石末和丸含口中津液咽下骨自隨下又方用縮砂甘草等分為末以綿裹少許噙之旋旋咽津久之隨痰吐出又方治獸骨鯁用象牙梳磨水咽下或以桑木上蟲屑末醋煎灌漱自下又方用皂角末吹入鼻中令涕出治誤吞針類用木炭燒紅急搗灰米湯調下三兩杯或用熟艾煮濃汁飲便解又方治吞針並釣子魚骨雜物須多食諸般肥食自然裹出若吞稻麥芒於咽喉間急取鵝口涎水咽之治誤吞竹木不得出用舊鋸子燒赤投酒中熱飲治誤吞金銀或銅錢入腹用石灰一杏核大硫黃一皂角子大同研末酒調服又方用肥豬肉與葵菜作羹餐數頓則銅鐵自然下又方誤吞銅餞用桑柴灰細研米飲調下二錢或用緑豆粉冷水調下三錢或茨菰取汁呷或濃煎艾湯飲或多服飴糖立效治針刺折在肉中用栝蔞根搗爛敷上一日換三次自出又方用車脂攤紙上如錢許貼上二日一換三五次其針自出車脂即車軸頭上油膩也治竹木簽刺入肉用牛膝草根嚼罨之即出又方以象牙屑敷之或以白梅肉敷之立效又方用羊糞為末水調塗刺上候疼搔之刺自出或嚼栗子敷之亦妙治手指甲頭腫用烏梅捶碎去核肉只取仁研米醋調入潰之自愈治腳趾縫爛用鵝掌黃皮燒存性為末糝之治指縫瘙癢成瘡有竅出血不止用多年糞桶箍篾燒灰敷治腳汗出用白礬乾葛煎湯洗效治遠行腳上打損用雜草燒鑊鏽和飯黏研成膏貼之用紙封上若打泡用油線穿過兩頭剪斷亦用鑊鏽飯黏貼之治遠行腳心腫痛用蚯蚓泥敷腫處高擱起腳一夕即愈治杖瘡用黍米燒灰和油塗止痛不作瘢黍米不可與小兒食不能行緩人筋骨令人好睡亦不得和牛肉食生寸白蟲又方杖畢飲童便和酒免血攻心用熱豆腐鋪在杖紫去處其氣如蒸其腐即紫復以熱豆腐鋪之以紫肉散盡淡紅為度又方用五倍子去瓤米醋浸一日慢火炒黃為末干糝不破腫痛者以醋調敷又方用雄黃二分無名異一分細研水敷極妙又方用水粉一兩赤石脂一錢生用水銀一分以麻油杵成膏攤傘紙上貼之緊縛如肉陷者用此膏填滿然後貼上立效又方若腫痛用大黃黃連黃柏黃芩各三錢乳香沒藥各一錢別研腦子少許為末冷水調勻攤緋絹上貼之又方若瘡熱毒疼痛用黃丹一兩蜜陀僧半兩輕粉一錢半麝香半錢龍腦一字為末糝瘡上以青帛蒙之中留一竅又方用蠶出繭殼燒灰存性為末每服三錢酒調下甚妙治湯燙火燒用多年廟上獸頭為末小油調敷之效又方用桐油塗上或土朱磨敷之又方水調銀硃敷之又方用麻油浸黃蜀葵花敷之又方用撏豬毛燒灰香油擦患處又方用螺螄殼多年乾白者火煅過為末如瘡破干糝如不破清油調敷又方用雞子煮熟去白用黃於鍋內熬油出冷敷之又方用山梔子濃調雞子清以鵝毛輕拂上又方用側柏葉燒存性為末雞子清調敷又方用醋甕泥敷之或以生柏葉搗爛敷或用干桑葉為末乾者蜜調敷濕者干糝或用鹽糝上用手按之或以豆漿塗之又方治向火多生炙斑瘡有汁用黃柏薄荷葉為末糝之治凍瘡用茄根濃煎湯沸洗以雀兒腦髓塗之又方用鵝掌黃皮焙乾燒灰存性為末溫則糝之又方手足凍裂用白芨不拘多少為末調敷裂處又方用五倍子為末同牛骨髓填縫內即安又方用頭髮一大握桐油一碗於瓦器內熬候油沸頭髮溶爛出火攤以瓦器收貯不令灰入每用百沸湯泡洗皸裂令軟拭乾敷之即安一方加水粉治冬月手足開裂用清油半兩以慢火煎沸入黃蠟一塊同煎候溶入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥敷薄紙貼之又方用五倍子為末和牛鼻繩末填縫內即自愈又方治手足開裂經春夏不愈者用生薑汁紅糟鹽同臘月豬膏研爛熱擦入皸內一時雖痛少頃便軟皸合再用即安又方用瀝青二兩黃蠟一兩共熱攪勻瓦罐盛貯先以熱湯洗令皮軟拭乾將藥於慢火炙溶敷之治酒皻鼻用白鹽常擦為妙治鼻瘡用杏仁研乳汁和敷或以烏牛耳垢敷治痱子痛癢用淨水搗楊柳青蒿汁調蛤粉敷雪水尤妙治漆毒成瘡用磨鐵槽中泥塗之或以蟹黃塗之愈治瘢痕出靨用桑柴灰汁熬成膏草莖刺破以新水沃之忌油膩等物治蛀干瘡用黑油傘紙燒灰合地上一宿出火氣敷瘡上便結靨效婦人第三十八治婦人月水不通用鼠屎燒灰一錢為末熱酒調下治婦人血氣不行上氣衝心用絲瓜蒂一個燒灰空心酒調每服一個治婦人血崩用槐角燒灰為末每服二錢酒調下效又方用蠶沙不拘多少為末每服五錢熱酒調服又方治婦人血崩不止用槐花二兩棕毛燒灰五錢水煎入鹽少許空心服或以烏梅燒灰烏梅湯下又方用蓮蓬殼燒存性酒服方寸匕又方用血蠍草為末姜酒調服一服而愈血蠍草生於磚縫井頭少在地上又方用鹽梅七個燒為末空心米飲服又方用陳槐花一兩雜草燒鑊鏽半兩為末燒紅稱錘淬酒下又方治血崩不止用白扁豆花焙乾為末紫者不用炒米煮湯入炒鹽少許空心數服即效又方用棕櫚皮絲瓜蒂燒灰等分為末鹽酒或鹽湯下效又方治血崩用野紅花取根洗淨研汁半盞以溫酒半盞和服立止治婦人白帶下用好酒同艾葉不拘多少煮雞卵熟空心只食雞卵治婦人赤白帶下用酸石榴五枚連皮搗攪汁每服半盞空心下又方用石榴東引根二把煮汁服治婦人六十二種風及腹中血氣刺痛用紅花二兩酒二盞煎八分溫服治婦人血風攻腦旋倒地不知人事用蒼耳草心不拘多少陰乾為末不時薑湯服一錢效治婦人臟躁悲傷欲哭象鬼神所附者用小麥一升甘草二兩大棗五兩每服一兩水二盞煎一盞服治婦人自哭自笑用紅棗燒存性米飲調下治婦人乳癰用赤小豆三合酒研爛去渣溫服留渣敷患處又方治乳癰爛見心者用貓兒腹下毛乾鍋內煅存性為末干糝或清油調入輕粉少許敷之又方用皂莢刺燒灰和海蛤粉為末熱酒調下揉散亦可又方用銀杏半斤四兩用酒研服四兩水研敷癰上又方用黃栝蔞一二個連皮瓤子切碎以無灰酒一碗於瓶內煮半碗去渣時時溫服酒盡再煮服初時便服此藥即時痛止更不成瘡如已成瘡服之其瘡自穿而痛止又方治乳上才覺硬腫作痛以蔥早尉之其法用樣闊口瓶以炭火入瓶內上以熱灰填蒲瓶口用蔥葉及蔥白捶損令遍覆瓶口以手帕裹瓶倒執將瓶口向腫處任意輕輕尉之有驗又方治乳癰將潰以小長罐燒紙錢在內急以罐口安乳上盡吸其毒氣治婦人吹乳極效用百齒霜即木梳上篦頭垢也不拘多少用無根水為丸即吊桶反瀝出者是也如雞頭大日服二三丸倒流水吞之服後令病人左乳者左臥右乳者右臥於無風溫熱處臥汗出效取倒流水法用新汲水傾屋上接之又方以橘皮燒灰存性食後熱酒調下二錢治婦人乳硬作痛用嫩桑葉左採研細米飲調攤紙花貼病處此證四十以下可治五十以上不可治治之則死不治則得終天年治婦人乳頭裂取秋後冷露茄子裂開者陰乾燒存性為末水調服未秋時但裂開者亦可治婦人血塊痛用牛膝草根酒煮服效治婦人癖塊用小便服之每日溫服一盞至二十日血片下即瘥又方醋煎大黃生者服之甚效治孕婦咳嗽用貝母去心麩皮炒令黃去麩皮為末研砂糖拌勻丸如雞頭大含化一丸神效治婦人胎漏用蔥白一把濃煮汁飲之甚效治婦人胎漏下血手足厥冷欲死用生艾汁二盞牛皮膠白蜜各二兩煎一盞半稍熱服之無生艾濃煎乾艾一方加刮下竹青一大把同煎治婦人因爭鬥或跌撲從高墜下或為重物所壓觸動胎氣腹痛下血服此後覺胎動極熱胎氣已安用縮砂不拘多少於尉斗內炒令熱透去皮取仁研為末每服二錢熱酒調下不飲酒煎艾鹽湯或米飲下又方用苧根一把洗淨生薑五片煎調粥服之效治孕婦忽腹絞痛用棗子十四枚燒焦為末童便調服又方用鹽一合燒赤以指撮酒中調服治孕婦兒在腹中哭用多年空屋下鼠穴中土一塊令孕婦噙之即住一方川黃連煎汁令母呷之治婦人胎前産後赤白痢用敗龜板一個醋炙搗為末米飲調下又方用生薑自然汁年少者十兩老者二十兩鴨子二個打碎入薑汁內攪勻煎至八分入蒲黃三錢煎五七沸空心溫服效又方治懷胎下赤白痢絞刺疼痛用雞子一個烏者尤妙梢頭作一竅子傾出青者留黃在內黃丹一錢入前雞子殼內打令相勻以厚紙裹黃泥固住火上炙熟焙乾為末每服二錢米飲調下一服愈者是男兩服愈者是女奇效治婦人難産或橫生或孕婦下血或脹滿用鐵稱錘燒赤投酒中飲之又方治難産用清油一盞水一盞對和用銀簪打和飲之又方用鳳仙子二錢研碎水下又方用黃蜀葵子二錢同鳳仙子並服又方用黃蜀葵子七十粒搗碎酒調服又方用蠶蛻紙半張燒灰白湯調下又方用香白芷雜草燒鑊鏽各等分為末每服二錢童便米醋各半呷沸湯澆入六七分點眼見效甚速再服即分娩矣或用蜀葵子四十九粒白滑石末三錢順流水煎湯調空心二服如人行五里即下又方治生産五七日不下垂死者及矮石女交骨用川芎當歸各一兩自死干龜殼一個酥炙黃男女頭髮一握燒存性共為末每服三錢水半鍾煎服約人行五里生胎死胎俱下無自死龜殼用鑽過廢殼亦可又方應急催生用清油同蜜等分少許湯調頓服又蜀葵子炒為末順流水溫暖調服亦下死胎又好京墨新汲水濃磨服之墨水裹兒出效又敗筆頭二個燒灰以藕節研自然汁溫酒調下效又産婦坐草時取路旁草鞋一隻用鼻絡小耳繩燒灰溫酒調服如得左足者男右足者女覆者兒死側者兒驚催生極驗又方催生用萆麻子研敷産婦手足心産後速拭去或以兩手各執一枚立下又方治難産久氣力乏不能生兼惡露盡出幹不能産者用赤小豆二升以水九升煮熟取汁入泡過明阿膠一兩同煎少時一服如未效再服不過三四服即産治婦人逆生倒産用萆麻子三十粒研爛婦人頂上剃去發少塗之須臾覺腹中提正便刮去卻於腳心塗之自然順生又方治逆生須臾不救母子俱亡用蛇蛻一條蟬蛻十四個頭髮一握並燒為灰每服二錢溫酒調並進二服仰臥霎時兒即順生又方用小絹針於兒腳心刺三五七刺用鹽少許擦刺處即時順生母子俱活又方用槐子二七粒井花水吞下又方治橫逆不順手足先出或子死腹中用灶中心對鍋底土細研每服一錢酒調下兒頭戴出妙更用搽産母臍中亦妙或用菟絲子末車前子米酒調下又方治橫生逆産諸藥不救但灸右腳小指尖頭二壯艾壯如小麥大下火立産治子死腹中口中屎臭舌青口出冷氣指甲青用栝蔞根為末逆流水調五錢服又方用灶中心對鍋底土三錢水調下又治産後惡物不下上攻心痛又方先用平胃散一帖作兩服每服酒水各一鍾同煎至一鍾卻投朴硝半兩研細再煎三五沸傾出候微溫服盡其胎即化血水而下又方下死胎用麝香半錢另研官桂末三錢和勻作一服溫酒調下須臾如手推下未效再服又方治子死胎不下胞破不生用鬼臼不拘多少黃色者去毛研為末細如粉不用羅以指捻之每服二錢用無灰酒一盞同煎至八分通口服立生如神又方治難産胞衣不下及兒死腹中欲絶者用白蘞半夏各一兩為末酒服一錢若難産只一服橫生二服倒則三服兒死四服效治産婦胞衣不下用萆麻子十四粒去殼搗爛以白麵和成膏貼腳心胞衣下速拭洗去如腸出即以此藥塗頂心回腸神效又方治胎衣不下惡血湊心其證心頭迷悶胎衣上逆衝心須臾不治其母即亡用乾漆五錢為末大附子一枚泡去皮臍為末用大黃末五錢酒醋熬干即入前二味為丸如梧桐子大每服三十丸淡醋湯吞下須臾又進二服胎衣立下此藥可豫先合下又方用赤小豆一升炒過用水三升煮二升去豆取汁溫服胎衣立下又方用婦人自己手足指甲燒灰酒調服須臾又進一服更令有力婦人抱起將竹筒於心上趕下妙治産後血暈心悶氣絶腹內惡血不盡絞痛用紅花酒煎服或以藕汁二碗飲之又方用松煙墨二錢火煅通紅窨滅火氣為末半匕溫酒調下京墨亦可又方用舊漆器燒微煙逼面熏之又方用韭菜切碎入茶瓶中以老米醋沸熱澆之紙密封瓶口勿令泄氣以瓶小嘴向産婦口鼻熏之立醒又方用半夏末少許吹入鼻中治産後下血不止用雜草燒鑊鏽二錢為末酒調服又方用干艾半兩生薑半兩濃煎湯服治産後子腸出不能收者用枳殼去瓤三兩煎湯溫浸良久即入又方用老鴉酸漿草一把煎湯才熏可收一半稍溫下手洗並收而安治産後惡物不出上攻心痛用灶中心對鍋底焦土研細酒調三五錢瀉出惡物立效治産後泄瀉惡露不下用大荊芥四五穗於盞內用火燒成灰不得犯油火入麝香少許研沸湯一二呷調下治産後腹脹痛不可忍煮鼠黏根為飲一服愈治乳婦乳汁不下用母豬蹄爪一隻帶蔥五莖同鹽酒煮羹飲之不下再煮飲仍用梳頭木梳於乳上梳下效又方用土瓜根為末酒調服又方用胡蜂窠一個炒為末酒調服治胎前産後諸症名濟陰返魂丹一名益母丸只益母草一味其草即茺蔚子其葉類火麻對節而生方梗凹面四五六月間節節開紫花南北隨處有之此草生二種白花者不是於端午小暑或六月六日花正開時連根收採透風處陰乾用時不犯銅鐵器以石臼搗羅為細末每服一丸各照後開湯使下若量加木香全當歸赤芍藥尤妙其藥不限丸數以病愈為度日服三五丸或丸如梧桐子大每服五七十丸熬膏尤佳治法具後熬膏法益母草不限多少依前法採連根葉莖洗淨用石臼內搗爛以麻布濾取濃汁入砂鍋內以文武火熬成膏如黑砂糖色為度入瓷罐內收貯每服用一茶匕極妙胎前臍腹刺痛胎動不安下血不止水煎秦艽糯米湯下或當歸湯亦可胎前産後臍腹作痛作聲或寒熱往來狀如瘧疾者俱溫米湯下臨産併産後各先用一丸童便酒化下安魂定魄血氣自然調順諸病不生又能破血痛養脈息調經絡功效不能盡述産後胎衣不下落在胞中及産前一切産難橫生不順子死經日不下脹滿腹中心悶心痛炒鹽湯下産後中風牙關緊急半身不遂失音不語童便無灰酒各半下産後氣喘咳嗽胸膈不利噁心口吐酸水面目浮腫兩脅疼痛舉動失力者溫酒下産後兩太陽穴痛呵缺心恤氣短肌體羸瘦不思飲食血風身熱手足頑麻百節疼痛溫米湯飲下産後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁下如無生者濃煎乾薄荷湯下或童便酒各半下産後面垢顏赤五心煩熱或結成血塊腹臍奔痛時發寒有冷汗者童便酒各半下或溫薄荷湯下産後余血惡不盡結滯腹臍刺痛惡物上衝心胸滿悶童便溫酒各半下産後未經滿月血氣不通咳嗽四肢無力臨睡自汗不止月水不調久而不治則為骨蒸之疾童便酒各半下産後鼻衄口乾舌黑童便酒下産後大小便不通煩躁口苦者薄荷自然汁下如無生者濃煎乾薄荷湯下産後痢疾米湯下産後瀉血水煎棗湯下産後赤白帶下煎膠艾湯下血崩漏下糯米湯下勒奶痛或成癰為末水調塗乳上一宿自瘥或生搗爛敷上亦可婦人久無子息溫酒下一九服至一月決有效驗小兒第三十九治小兒初生口中有惡物才生不候聲出急用軟帛或綿裹手指蘸黃連甘草汁拭口中惡汁稍定更以蜜少許調硃砂一字抹入口中鎮心安神解惡物之毒一生免瘡痘之患此藥妊婦臨月宜預辦之治小兒生下即死急看兒口中懸壅在齶上有泡以手指摘破用帛裹指拭血令淨若血入喉即不可活治小兒初生氣欲絶不能啼者必是難産或胃寒所致急以綿絮包裹抱懷中未可斷臍帶且將胞衣置炭火爐中燒之仍作大紙捻蘸油點火著臍帶上往來燎之更以熱醋湯燙洗臍帶須臾氣回啼哭如常方可洗浴了卻斷臍帶治小兒初生大小便不通腹脹欲絶者急令婦人以溫水漱口吸咂兒前後項心並臍下手足共七處每一處吮三五次漱口吸咂取紅赤為度須臾自通不爾無生意有此證遇此法可謂再生治小兒初生遍身無皮但是紅肉宜速以早米粉干撲候生皮方止治小兒臍腫先用荊芥水洗了蔥葉一片火上炙過地上出火氣以指甲刮薄內搭放腫處次日便消治小兒面目黃赤氣息喘急啼聲不出舌強唇青撮口皺面飲乳有妨用白殭蠶二枚去嘴略炒為末蜜調敷唇中治小兒初生不飲乳及不大小便用蔥白二寸破作四界以乳汁於砂銚內煎灌之立效治小兒吐乳田中蚯蚓泥為末米飲調下治小兒初生口噤不開用赤足蜈蚣一條去足炙令焦細研為末每用半錢以豬乳汁半盞和勻分三四次灌之治小兒吐不定用五倍子二個一生一熟甘草一根用濕紙裹煨共為末米汁調下半錢治小兒重舌急證用指去爪先於舌下筋上擦至根漸深擦入如此三次又以指蘸水取項後燕窠小窟中筋自上趕下至小窟深深擦入亦三次小兒若飲乳勝前則病去矣又方用針刺出惡血即愈又方治小兒木舌用黃蜀葵花研細黃丹半之同研點七次治小兒鵝口不能乳用地雞研水塗地雞即扁蟲人家磚中多有之治小兒口瘡用吳茱萸末醋調貼兩腳心移夜即愈又方用生白礬為末水調攤紙上貼腳心方貼上再以水濕之治小兒牙疳用白礬裝於五倍子內合燒過為末敷治小兒諸熱驚癇用青黛水研服又方用蜂窠大者水煮浴兒三四次治小兒卒驚似有痛處而不知用雄雞血滴兒口中又方用燕窠中糞煎湯洗浴又方治小兒驚啼用亂髮燒灰酒調服治小兒夜啼燈草燒灰敷乳上與吃燈花尤妙治小兒吃黃土用干黃土研細濃煎黃連和為餅服治小兒寸白蟲用酸石榴東引根二兩糯米三十粒水一碗煎空心服須泄瀉神效治小兒頭上瘡及浸淫瘡並急疳瘡用芝麻生嚼塗治小兒甜瘡多生於面部兩耳前令母口中嚼白米成膏子臨臥塗之不過三五次愈治小兒眉煉頭瘡用小麥不拘多少燒令黑色存性為末以小油調敷之又方用䤵針刺出血一刺不愈再刺之三刺則愈矣治小兒火丹從背上起頭上起者用慎火草搗汁敷上慎火草即瓦蔥又方用針刺紅處出惡血或用寒水石為末油調敷之效治小兒胭脂火丹用萆麻子去皮研爛並鏽鐵磨水於紅處周圍圈之候乾再隨處圈塗之治小兒丹毒用灶中對鍋底焦土研細以新汲水調塗干即易之效治小兒痘疹要方名兔血丸臘月八日採生兔一隻取血以蕎麵和之少加雄黃四五分候乾成餅凡初生小兒三日後如緑豆大者與二三丸乳汁送下遍身發出紅點是其徵驗有終身不出痘疹者雖出亦不甚稠密也嬰兒已長成會飲食者就以兔肉啖之尤妙或云不必八日但臘月兔亦可然終不若臘月八日為佳也治小兒痘瘡出不透腹痛甚或黑靨者用蟬蛻一十五個去翅足淨洗為末每服一錢熟水調下腹痛立止而出透乳母亦可服一錢又方用干棠球為細末湯點服立見出透紅活荔枝殼煎湯服亦可治小兒痘瘡陷入不發黑色氣欲絶用穿山甲湯洗淨炒令焦黃為末每服半錢紫蘇煎湯入老酒少許服之又方治痘瘡倒陷用臘月內收人中白即馬桶內尿鹼是也放通風處以火煅成煤水調三五錢服又方用胡桃一個燒存性干胭脂三錢為末用胡荽煎酒調下一錢治小兒痘瘡初出光壯忽然黑陷心煩躁急氣喘妄語如見鬼神用人牙齒燒存性為末每個作一服酒調下治小兒痘瘡入眼或病後生翳障用蟬蛻洗淨去土白菊花各等分為散每服二錢入蜜少許水一盞煎乳食後量兒大小與服之屢驗又方用兔子屎焙乾為末茶調下瘡疹安後方可多服仍治昏翳治痘瘡入眼痛楚恐傷眼睛用浮萍陰乾為末每服三錢隨兒大小以羊子肝半個入盞內以竹籤刺碎爛投水半合攪取汁調下食後服不甚者一錢瘥已傷目者十服瘥治小兒痘瘡爛成片用黃牛屎干敷膿多痛甚者乾淨黃土敷之瘡遍口中不能食者蜜浸黃柏取汁啖之凡瘡欲成痂頻以面油乳酥清蜜潤之可揭即揭血出無害若干硬已久又成瘢痕治小兒痘瘡爬搔成瘡膿血淋漓用多年蓋屋爛草或蓋牆草不拘多少曬乾為末干糝無時若渾身瘡破膿血不絶黏沾衣服難以坐臥可多用攤於席上令兒坐臥即干治小兒痘瘡出後有餘瘡塞鼻中不能睡起用木筆花研為末加麝香少許蔥白蘸藥入鼻中數次通治小兒痘瘡愈後瘡痂雖落其色黯或凸或凹用白蜜不拘多少塗於瘡上其痂易落且無疤痕亦不腥穢治小兒痘瘡後身體及肢節上生癰蝕瘡膿水不幹用出蠶蛾綿繭不拘多少用白礬捶碎塞入繭內令滿以炭火燒候白礬汁干取出研細干糝瘡上若不早治則潰筋骨以至難治治小兒容忤口吐青黃白沫水穀鮮進面色變易喘息腹痛狀似驚癇但哭不止視其口中懸壅左右若有小小腫核即以竹針刺破之或以指爪甲爬破急以醋炭降真香皂莢燒熏又以灶中對鍋底焦土蚯蚓糞各等分為末水調塗頭上及五心敷之治小兒腦後項邊有核如瘰癧狀按之轉動軟而不疼名附骨疳毒兼治諸疳一服虛熱退二服渴止三服瀉痢止用蟾蜍一枚又名蛤蟆夏月藟中取腹大不鳴不跳者其身癩磊多者是取糞缸內蛆蟲一杓置桶中以尿浸之桶上要蓋不與蟲走將蟾蜍殺之放在蟲中任與蟲食一日夜次以新布袋盡包系定置之急水中浸一宿取出瓦上焙為末入麝香一字粳米飯揉丸如麻子大每服三十丸米飲下治附骨疳項後有核其間有蟲如米粉不速破之則蟲流散蝕臟腑以致肢體作癰瘡便利膿血虛熱羸瘦氣血虛憊治法刺破其核膏藥貼之則愈治小兒久患疳熱體虛不食及病後天柱骨倒用白殭蠶為末三年兒半錢薄荷酒調下治小兒疳後虛熱小便腫用韭菜地上蚯蚓屎火煅以碗合地上出火氣為末清油調敷治小兒無毒遊腫用破草鞋亂髮燒灰醋調敷上治小兒月蝕耳疳瘡用胡粉和東方壁土為末敷又方用蛤蟆燒存性為末豬脂調敷治小兒口角爛瘡用亂髮燒灰為細末豬脂和敷燕窠泥亦妙治小兒耳邊鼻下赤爛用黃丹二錢煅令赤色緑豆粉一錢白礬一錢飛過研細干敷瘡上唾調亦可治小兒卒得瘭瘡用赤爛牛糞燒灰研細敷上治小兒囟門陷下不平滿用黃狗頭骨炙黃為末雞子清調敷治小兒頭骨縫開不合名曰解顱用蛇蛻炒焦為末用豬頰骨中髓調敷頂上日三四次又方用驢頭骨不拘多少燒灰研細以清油調敷頭縫中治小兒牙齒不生用雄鼠糞二十一粒兩頭尖者是也每日用一粒揩齒根上至二十二粒當生治小兒頭上軟癤用大枳殼一枚去瓤令空磨令平口以稠麵糊搽四唇黏在癤上自破膿溜出盡更無瘢痕又方用枯白礬為末清油調敷亦效又方用桃樹上不落干桃子燒灰清油調敷又方用茄子切半個看瘡大小剜空周圍用醋調生面糊塗貼治小兒脫肛用萆麻子四十九粒研爛水調作餅子貼頂上立效又方用蔥湯洗令軟芭蕉葉托上又方用浮萍草不拘多少杵為細末干貼患處又方用新磚一片燒紅以醋澆之即用腳布疊數重壓定使熱氣上透不可過熱令病者以臀坐於布上如覺布溫逐旋減之以常得溫熱為度治小兒遺尿用雞肫腸一具燒存性豬尿胞一個炙焦為末每服一錢酒調下男用雌雞者女用雄雞者治小兒陰囊忽腫多因坐地上為風濕或蟲蟻吹著用蟬蛻半兩水一碗煎湯洗腫處其腫痛立止再溫再洗又方治小兒卵腫研桃仁唾調敷治小兒疝氣腫硬用蚯蚓不去土曬乾為末唾津調塗患處又方用古鏡煮汁服亦治小兒驚邪諸惡疾治小兒腹脹用韭菜根搗汁和豬脂煎服
