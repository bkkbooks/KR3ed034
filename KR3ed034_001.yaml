body:
  text: 卷之一五絶死第一治五絶死自縊死溺水死打撲跌搕木石壓死産後血迷暈死中惡鬼擊死夜魘死凡心頭溫者皆可救治用半夏湯泡七次為末丸如豆大吹入鼻中噴嚏即活或用皂莢為末吹入鼻中亦妙又方急於人中穴及兩腳尖拇指甲離甲一韭葉許各灸三五壯即活臍中灸百壯亦效救自縊凡自縊高懸者徐徐抱住解繩不得截斷上下安被臥之以一人用腳踏其兩肩手挽其發常令弦急勿使緩縱一人以手按據胸上數磨動之一人摩捋臂脛屈伸之若已強直但漸屈之並按其腹如此一頃雖得氣從口出呼吸眼開仍引按不住須臾以少桂湯及粥清灌令喉潤漸漸能咽乃止更令兩人以蘆管吹其兩耳無不活者自旦至暮雖冷亦可救自暮至旦陰氣盛為難救爾又法以一人兩手掩其口鼻勿令透氣一人用手摩其頸痕兩時氣急則活救溺水死一宿者尚活用皂莢為末綿裹塞糞門須臾出水即活又方救起放大凳臥著腳後凳坫起磚二塊卻用鹽擦臍中待水自流出切不可倒提出水但心下溫者皆可救又方急解衣帶艾灸臍中仍令兩人以蘆管吹其耳中即活又方溺水救起者即將牛一頭以溺水人肚橫覆在牛背上兩邊用人扶策徐徐牽牛而行以出腹中之水如醒以蘇合香丸之類或老薑擦牙若無牛以活人於長板凳上仰臥即令溺水人如前法將肚相抵活人身上水出即活救木石壓死並跌搕傷從高墜下跌死氣絶不能言者急拍開口以熱小便灌之又方撲打墜損惡血攻心悶亂疼痛用乾荷葉五片燒令煙盡空腹以童便溫一鍾調下三錢日三服又方被打惡血攻心用小便一碗溫服救中惡鬼擊客忤一切卒死用葛蒲根生搗絞汁灌鼻中或口中即活又方治卒死心頭熱者用百草花曬乾水漬封埋百日砂鍋內連水煎稠丸如皂莢子大放一丸入患人口內須臾即活又方用井底泥塗目畢令人垂頭於井呼其姓名便起又方韭搗汁灌鼻中又方以雄雞冠割取血蘆管吹入鼻中並塗其面干後復塗仍以灰圍四旁立起又方治鬼擊病卒著人如刀刺胸腹內痛不可按熟艾水煮服若卒心痛為客氣所中者當吐出蟲物又方卒死而口張反折者灸兩手足大指甲後各十四壯又方卒死四肢不收失便者用馬糞一升水三斗煮取汁二斗以洗之又取牛糞一升溫酒和灌口中灸心下一寸臍上二寸臍下四寸各一百壯又方卒死脈動而無氣用菖蒲屑末納耳鼻孔中吹之及著舌底又方治胸脅腹內絞急切痛如鬼擊之狀不可按摩或吐血衄血用熟艾如拳大水五鍾煮三鍾頻服又方用鹽一盞水二盞和服以冷水噀之即瘥治魘寐卒死諸暴絶證名半夏散用半夏不拘多少湯洗七次為末每用少許吹入鼻中心頭溫者可治倉卒無藥急於人中穴及兩腳大拇指內離甲一韭葉許各灸三五壯即活又方救夜睡魘死者不得近前叫喚但絞痛其腳跟及足拇指甲際多唾其面不省者移動些少臥處徐徐喚之原有燈則存無燈切不可點照又方用皂莢為末吹入鼻中又方用桃枝柳枝取東邊者各三四寸煎湯二鍾候溫灌服又方用灶中心對鍋底土捶碎為末每服二錢新汲水調灌更挑半指甲許吹入鼻中又方用蘆管吹兩耳或以鹽湯灌之或搗韭汁半盞灌鼻中冬月掘根研汁救夏月途中熱死者不可用冷水灌沃及以冷物逼外得冷即死宜移置陰處急取路上熱土於死人臍作窩多令人尿溺於臍中又取路上熱土並大蒜同研爛水調去渣灌下又方濃煎灰蓼汁一碗灌之即活救冬月凍死及落水凍死微有氣者脫去濕衣解活人熱衣包之用大米炒熱尉心上或炒灶灰令熱以囊盛尉心上冷即換之令暖氣通溫以熱酒薑湯或粥飲少許灌之即活又方用氈單或藁薦裹之以索系定板平穩處令兩人對面輕輕滾轉往來如擀氈法四肢溫和即活切不可用火烘之逼寒氣入內即死虛勞第二治虛勞用豬肚子釀黃糯米蒸熟搗為丸白湯下並治小兒疳蛔黃病又方用青蒿細切水三碗童便五碗煎取一碗半去渣熬成膏以甘草末為丸如梧桐子大空心溫酒吞二十丸又方用枸杞葉半升細切粳米二合瓦器中煮作粥五味調和食之又方用蓮實去皮留心不拘多少酒浸一宿入於豬肚內水煮乾取出切碎焙乾為末酒糊丸如雞頭大每服五七十丸溫酒食前服又方用童便兩盞無灰酒兩盞以瓦瓶貯之全豬腰子一對放在內用泥泥瓶口日晚以慢火煨熟至中夜止至五更初再以火溫之發瓶飲酒食腰子病篤者一月效瘦怯亦可服此又方治骨蒸勞熱及五痔腸風下血傳尸勞氣並蟲咬心痛用鰻鱺魚酒醋五味煮食治諸傳尸勞氣殺蟲去毒用川椒二斤擇去子併合口者炒出汗為末以酒糊丸如梧桐子大空心服五十丸效又方用死人枕煮汁服之治自汗並夜間盜汗用五倍子末唾調填滿臍中束定一宿即止又方用浮麥炒為細末每服二錢米飲下又方用陳米不拘多少麩皮同炒令黃色研細為末米飲調下不拘時或白炸豬肉蘸食之治陽脫證或因大吐瀉後四肢厥冷元氣不接不省人事或傷寒新瘥誤行房事小腹緊痛外腎搐縮面黑氣喘冷汗出不救即死用蔥白連須三七根細切砂盆內研細用酒二碗煮至一碗分作三服灌之陽氣即回又方用生薑二兩切碎酒煎服之仍炒蔥白或鹽尉臍下氣海勿令氣冷諸風第三治中風心煩恍惚或腹痛或絶而復蘇用灶中對鍋底土一塊研碎水調服口噤者強開灌之得入便效又方卒中風不語者用竹瀝灌之又方用香油或薑汁灌之或吐或利即愈又方中風口噤不開痰涎壅塞用皂莢一挺去皮弦塗豬脂以火炙黃為末每服一錢氣實盛者二錢溫酒調服牙關不開白梅揩齒口開即灌藥下吐出風痰愈又方用白礬二錢為末生薑自然汁調灌之又方治中風忽然若醉形體昏悶四肢不收涎潮於上膈氣閉不通用豬牙皂莢四條肥實不蛀者去黑皮白礬一兩光明者共為末輕者半錢重者七分溫水灌下但微出冷涎一二升便醒次緩調治又方用側柏葉一握去枝蔥白一握連根細研如泥無灰酒一鍾同煎一二十沸去渣溫服不拘時如不飲酒分作四五次服又方治癱瘓大風一切諸風仍治腳氣並攧撲傷折及破傷風服過百粒即為全人用紫色浮萍七月半擇取淨者不拘多少以盆盛水以竹篩盛萍擱於水盆上曬乾為細末煉蜜丸如彈子大每服一粒豆淋酒空心食前化下造豆淋酒法用黑豆半升揀淨炒令煙出以無灰酒三升浸一晝夜去豆取酒用之亦可常服又方治中風身體強直不得屈伸反覆用枸橘樹皮細切一升以酒二升浸一宿每日溫酒服半升酒盡再作又方治暗風倒地用北細辛為末每挑一字㗜鼻中又方治中風失音用白殭蠶七枚為末酒調服又方用韭菜搗汁服又方産後中風不語角弓反張用大蒜三十片水一碗煮半碗灌下治口眼喎斜用栝蔞擂爛絞取汁和蕎麥麵搗作餅子炙令熱尉如正便止不令大過又方用鱔魚一條以針刺頭上血左歪塗右右歪塗左如平正即洗去鱔魚放之則不發又方用水調石灰如前法塗之治白虎風歷節痛甚肉理枯虛生蟲遊走癢痛兼身體麻木兼治傳尸勞蟲甚效用真川椒紅大者去子併合口者以黃稈紙二重於爐上炒出汗取頓地上用砂盆蓋以灰圍盆弦約一時為末老酒浸白糕為糊丸如梧桐子大每服四十丸食前鹽湯下若治麻木辣桂煎湯下腰痛茴香酒下又方治虎風走注痛痹用三年陳釅醋二碗蔥白二斤煮一沸漉出布帛熱裹當患處尉之又方用芥菜子為末雞子白調敷患處治麻木不知痛癢用芥菜子研細醋調塗又方霜降後採桑葉煎湯洗又方用麻子炒香小便浸服治風濕麻痹四肢拘攣用蒼耳子三兩水一碗半煎去渣分作三服或為細末糊丸如梧桐子大每服五十丸溫酒吞下又方治手足為風濕所傷兼有腳氣用晚蠶沙以米醋拌炒令熱用綿絮包尉之治大風肌肉麻痹皮膚壞爛用桑枝燒灰二斗熱湯淋取汁洗頭面次用大豆及緑豆漿和熱水三日一浴一日一洗面卻用側柏葉蒸曬乾白膠香各等分為末蜜丸溫水下三七粒日三服又方治大風惡疾雙目昏眉發自落鼻梁崩倒肌膚瘡爛若不可救用皂莢刺三斤炭火蒸久曬乾為末濃煎大黃湯下二錢服旬日間眉發再生肌膚悅潤眼目自明又方治大風不拘久近用真麻油半缸入坐其中浸七日無不瘥者又方大風癩疾用煉成松香白色者不計多少研為細末煉蜜和丸如梧桐子大每服一十丸食前蜜湯下一月後大效治諸風癇俗呼馬風病用生白礬一兩好臘茶半兩煉蜜為丸如梧桐子大每服三十丸再用臘茶湯下久服風涎由大便出傷寒時疫第四治傷寒時疫及傷風初覺頭痛身熱用帶根蔥頭一個切碎以醋一盞煎稀粥飲一碗乘熱吃下以被蓋汗出即解又方治傷寒已發汗未發汗頭痛如破生薑二兩連須蔥白半斤用水二碗煎令減半去渣分三服又方初覺傷寒傷食傷酒傷風以酸齏汁三大碗煎三五沸於避風處先飲半碗以手揉肚再飲半碗又用手揉肚更飲更揉直至饜足心無所容以雞翎探喉中令吐後煎蔥醋辣湯投之以衣被蓋覆汗出愈或用百沸湯依前法飲揉探吐亦妙或用甜菜搗汁飲之又方導引一法盤腳而坐用兩手交十指攀腦後風池風府二穴乃是風門也向前叩首幾至於地如此連點一百二十數急以蔥醋粥辛辣湯投之汗出立解又方治傷寒鼻中出血不止用茅草花一大把無花用根以水煎濃汁食後服治陰證用蔥白一大把如茶盞大用紙卷緊卻以快刀切齊一指厚片安於臍上以熱尉斗尉之待汗出為度一片未效再切一片尉之又方治陰毒傷寒用芥菜子末新水調如膏藥貼臍上汗出為愈傷寒戒忌病新差後但少吃糜粥常令稍飢不得飽食反此則復不得早起不得梳頭洗面不得多言不得勞心費力反此則復及差後百日內氣體未得平復犯房事者死又忌食羊雞犬肥膩諸肉汁及醃藏鮓醢油餅麵食病再發治天行病熱盛用蚯蚓以鹽塗之化成水去泥飲之亦治交接勞復或陰腫縮入腹痛又方天行病心悶用水中細苔搗汁服又方治時行病新好後多傷飲食其病復發用杏仁五兩去皮尖醋二碗煎半碗取汁服愈治時行病後犯房勞復發男病以婦人褲襠燒灰女病以男子褲襠燒灰湯服治孕婦遭時疫令子不安頓用井底泥塗足心又方用灶中對鍋底土研細末水調服仍塗臍上方五寸干再換治天行瘟疫傳染將初病人衣服於甑上蒸過則一家不染若親戚鄉里有患瘟疫欲去看問先將清油抹鼻孔後出外又將紙捻於鼻內探取噴嚏三五個則不傳染又方用雄黃研細水調以筆濃蘸塗鼻竅中與病人同床亦不相染初洗面後及臥時點之又方凡入病久房內須舌頂上齶努力閉氣一口使氣充滿毫竅則病不能染著又方五月五日收蒼耳草陰乾水煎服中諸毒第五治誤食諸毒草並百物毒救人於必死用板藍根乾者四兩貫衆去土一兩青黛別研生甘草各二兩上為末蜜丸如梧桐子大以青黛別為衣如稍覺精神恍惚噁心即是誤中諸毒急取藥十五丸爛嚼新汲水下又方凡中毒及蛇蟲咬傷即用上好青黛雄黃各等分為末新汲水調服二錢又方治中諸物毒用晉礬建茶各等分為末每服二錢新汲水調下得吐即效未吐再服又方治蠱毒名丹砂丸用雄黃另研硃砂另研各五錢藜蘆略炒鬼臼巴豆去殼心膜油各二錢五分為末蜜丸如豆大每服三丸空心乾薑湯下當轉下惡物並蠱等如煩悶後以鴨為羹食之又方治五種蠱毒用雄黃末麝香末各等分取生羊肝如指大以刀開內裹藥吞之又方用升麻三錢溪水調服又方用馬兜鈴根三兩搗篩分為三帖每一帖以水一大鐘煎至五分去渣空心頻服當時吐蠱出未快再服之以快為度又方救中蠱毒用白礬一塊嚼之覺甜不澀次嚼黑豆不腥者便是有蠱也用木梳齒上垢膩不拘多少服之吐出惡物又方用石榴皮煎汁飲之即吐出活蟲無不愈者又方用蠶蛻紙不拘多少捻作紙條蘸麻油燒存性為末水調一錢頻服諸中毒面青脈絶昏迷如醉口噤吐血服之即蘇又方取鵓鳩熱血隨多少服之又方取白雞鴨血灌口中立效又方取胡荽根搗汁半盞和酒服其蠱立下又方解諸毒殺腹內毒蟲用藍青葉研水服又方治中毒下血者用蝟皮燒為灰細研水調下二錢日進三服立愈解中砒霜毒用漢椒四十九粒黑豆十四粒烏梅二個打碎甘草節二寸碎之上㕮咀用水一碗煎至七分溫服又方白扁豆青黛甘草各等分巴豆一錢去殼不去油上㕮咀為末以砂糖一大塊水化開調一大盞飲之毒隨利去卻服五靈散之類又方用白扁豆一合為末冷水調下又方用清油一碗灌之又方用早禾稈燒灰新汲水淋汁生絹濾過冷服一碗毒從下利即安又方旋刺下羊血或雞鴨血熱服兼解鼠莽毒及丹藥毒又方藍根砂糖二味相和擂水服之或加薄荷汁尤妙及解巴豆毒又方以地漿調鉛粉末服之立解豆豉汁亦佳又方用醬調水灌下救食河豚急以清油多灌之吐出即愈又方用五倍子白礬等分為末水調灌之食諸魚中毒用橘皮汁大豆汁馬鞭草汁蘆根汁紫蘇汁飲之食鱔鱉蛤蟆毒用豆豉一大合新汲水半碗浸令豉水濃溫服之即瘥此三物令人小便祕臍下痛有至死者食蟹中毒濃煮紫蘇飲一兩盞解之食六畜肉中毒以壁上黃上水調服二錢即瘥食牛肉中毒以豬牙燒灰為末水調一錢服又方飲井水一碗自消食馬肉中毒搗蘆根汁飲一盞兼作湯浴之即解食風狗肉中毒用杏仁三兩和皮細研和勻分作三服以熱湯三盞下其狗肉皆全片出即瘥食豬肉中毒燒豬糞為末水調服一錢不過三服瘥食鴨肉中毒以糯米泔溫服二鍾食牛馬肉中毒用粉草五兩細切微炒搗細量患人吃得多少酒取無灰酒一處研去渣溫服須臾大吐瀉毒亦隨去雖十分渴不可飲水飲水難救並解一切諸毒食菜中毒用雞糞燒為末水調服一錢未解更服食野菌中毒用甘草不拘多少以麻油一盞煎數沸冷服其毒即解又方掘新地坑汲井水於內攪之令澄清取飲而解治中諸藥毒用生甘草黑豆淡竹葉各等分上㕮咀用水一鍾濃煎服又方用五倍子二兩研細用無灰酒調服毒在上即吐在下即瀉又方用緑豆粉水調服又方生薑搗汁服又方用蠶蛻紙燒灰研細每服一錢冷水調下頻服取瘥雖面青脈絶腹脹吐血服之立效亦治牛馬食花蜘蛛腹脹欲死者中巴豆毒以黃連大豆菖蒲汁並解之中烏頭天雄附子毒用大豆汁解又方遠志防風棗肉飴糖並能解中鼠莽毒用枯礬細茶為末各少許新汲水調服纍驗又方用大黑豆煮汁服之如欲試其驗先用鼠莽草葉以豆汁澆其根從此敗爛不復生矣中丹毒用灶中對鍋底土水調服誤食桐油令人嘔泄飲熱酒乃解諸蟲蛇傷第六救虎傷用生薑汁服兼洗傷處白礬末敷瘡上救毒蛇傷並諸色惡蟲毒氣入腹者用蒼耳草嫩葉搗汁灌之將渣厚敷傷處犬咬煮汁服之治惡蛇惡犬蜈蚣蠍子咬傷用細辛白芷各二錢雄黃一錢麝香少許上為末以好酒調服一錢又方用貝母為末酒調令病者儘量飲之少頃酒自傷處為水流出候水盡卻以藥渣敷瘡上即愈又方用艾於傷處灸三五壯拔去毒即愈又方用清油燈心點燈以傷處於煙上熏之其痛即愈又方用雞糞塗之又方用桕樹葉魚腥草皺面草草決明一處研細敷上亦佳治蛇咬傷用白礬置刀上燒汁熱滴咬處亦以礬湯服之又方用青木香不拘多少煎服其痛即止又方用雄黃五靈脂貝母香白芷各等分上為末每服二錢熱酒調服又方用白礬滾水泡洗傷處治蛇咬毒入腹者取兩刀於水中相磨飲其汁又方用灰蓼搗汁飲之渣敷傷處仍以頭髮縛兩頭又方用香白芷為末麥門冬去心濃煎湯調下頃刻咬處出黃水盡腫消皮合仍用此藥渣塗傷處又方用水萍搗絞汁服又方急於無風處以麻皮縛咬處上下重者刀剜去傷肉小便洗令淨燒鐵物烙之然後填蚯蚓泥次填陳年石灰末絹扎住輕者針刺瘡口並四旁出血小便洗淨以蒜片著咬處艾灸三五壯治瘋犬傷急於無風處嗍去瘡孔血或是干孔針刺去血小便洗令淨用半瓣胡桃殼以人糞填滿掩瘡孔艾灸一百壯後一日灸一百壯百日止急服者用蛤蟆幹一個斑蝥二十個去頭翅足用糯米炒黃只用斑蝥與蛤蟆為末酒調或水調服之分為四服以小便瀉下惡物為度未見惡物量輕重再服者用韭菜汁一盞常敷者用虎骨末和石灰臘豬脂調敷之禁飲酒食雞魚豬肉肥膩終身忌食犬肉蠶蛹春夏初交犬多發狂被咬者無出於灸七日當一發三七日不發可全免如見痛定瘡合便以為好不治者必死犬狂者其尾必直下不卷口流涎舌黑色又方去毒血以漿水洗淨紙上炒黃丹赤色貼之妙又方用紫蘇葉細嚼敷患處即不痛又方治咬傷及經久復發者用雄黃黃明者五錢麝香五分上研勻以酒調服二錢服後得睡為佳俟其自醒利下惡物再進一服即見效又方用生南星防風各等分上為末先以口噙漿水洗淨傷處用綿拭乾以藥糝上更不發無膿易瘥又方云此病雖為小可乃九死一生之病可急用斑蝥七個去翅足為末酒調服於小便盆內見衣沫似狗形亦不再發也此方纍試經驗又方用蔥白心四十九根搗爛如膏用生蜜一同調和用濕筒兒盛放用紙封一七日貼傷處瘡口上七日又用蔥白皮封著如瘡口大再換膏子貼共二七日切忌諸般葷腥一百日外用消風散一錢用熟犍豬肉七片蔥白七莖蜜一小匙和撲再入原煮豬肉汁泡使蔥白熟令患人熱食小兒用肉七小片消風散一錢蜜半匙煮服又方取小兒胎髮炒新香附野菊花研細酒調服盡醉又方用紫蘇口嚼碎塗之治常犬傷用蚯蚓泥和鹽研敷之亦治狂犬及毒蛇傷又方以砂糖塗之又方急於無風處嗍去瘡孔血小便洗淨用熱牛糞敷或鼠糞為末和豬脂敷或韭菜和石灰搗成餅子陰乾為末和豬脂敷更以韭菜生薑搗汁服之又方先以蔥湯洗後以研爛杏仁塗傷處又方用萆麻子五十粒去殼井水研成膏先以鹽水洗咬處敷貼又方浸椒水調莽草末塗之亦治貓傷又方白礬為末糝瘡內裹之又方用虎骨屑敷上即愈治馬咬及踏傷用艾灸瘡上並腫處又用婦人月經或人糞或馬糞或鼠糞燒為末和豬脂敷之皆效又方人體先有瘡因乘馬為馬汗或馬毛入瘡中或為馬氣汗蒸致腫痛宜數易冷水漬之難漬處以布浸濕拓之又方割雞冠血三五滴入瘡內大馬用雌雞小馬用雄雞治豬咬用屋溜中泥塗之即今之承溜也治貓咬用薄荷汁塗之治鼠咬用貓毛燒灰麝香少許津唾調敷之治諸惡蟲傷用蛇蛻煮湯洗三兩度或以膩粉生薑汁調敷傷處治蜈蚣咬以麻鞋底揩之又方用蚯蚓泥挹之或刺雞冠血塗或以桑樹汁敷之又方用香附子嚼擦患處立效治蜂蠆毒用野苧葉擦之如不便急以手就頭爬垢膩敷之或用鹽擦或用人尿洗之或桑樹汁敷之又方油木梳火上炙熱尉之又方解九里蜂毒用皂莢鑽孔貼在蜂叮處就皂莢孔上用艾灸三五壯即安治蠍螫用白礬半夏各等分為末好醋調貼痛止毒出又方先以針刺螫處出血冷水浸之水稍溫即易之有難浸處以舊布浸冷水頻換拓之又方治蠍螫雄者在一處痛用井底泥敷之雌者牽諸處痛當檐下泥敷之或以白礬末水調先挑出黑刺即塗之治蜘蛛傷遍身成瘡用蔥葉一莖小頭作一孔盛蚯蚓一條兜兩頭不令透氣搖動化為水點傷處又方嚼韭白敷或雄黃亦可遍身腫服藍汁又方蜘蛛咬遍身生絲用羊乳一味飲之極妙或用鹽和油敷上數數揩之治蚯蚓咬或於地上坐臥不覺咬腎陰腫鹽湯溫洗數次甚效治闢蝨用蜈蚣萍曬乾燒煙燻之則去青鹽水遍灑床席即絶治八腳蟲傷其蟲隱於壁間以尿射人遍身生瘡狀如湯火傷用烏雞翎燒灰雞子白調敷又方用生甘草煎湯洗之或嚼梨葉敷之或搗韭汁塗之或將麻子敷之治天頭蛇毒用落蘇即金絲草金銀花藤五葉紫葛天喬麥切碎用十分好醋濃煎先熏後洗頭痛第七治頭痛用皂莢為末吹入鼻中得嚏則止又方治遠年近日一切偏正頭疼用蘿蔔取汁一蜆殼令病人仰臥右疼注入左鼻左疼注入右鼻左右皆疼兩鼻並注之又方用蓽茇為末令患者含水左邊疼左鼻吸一字右邊疼令右邊吸一字即效又方用大蒜一枚去皮研取汁令病人仰臥垂頭以箸蘸點入鼻中急入腦眼中淚出又方用萆麻子一兩去皮研爛貼痛處咽喉第八治纏喉風以桐油灌之或燈盞底油灌之吐出風疾立愈又方用馬蘭頭草夏取葉冬取根搗汁和醋滴入鼻中又方治喉閉逡巡不救用皂莢去皮子半兩為細末箸頭點少許在痛處更以醋糊調藥末塗項上須臾便破血出立效又方用蛇蛻燒灰每用一錢以竹筒吹入喉內又方用生白礬研細塗於綿針上按於喉中立破綿針用榆條上以綿裹作棗大是也又方用射干即扁竹葉根也旋取新者不拘多少擂爛取汁吞下或動臟腑即解或用醋同研取汁噙引出涎愈又方用嫩艾葉研取汁吞下亦佳或用鼓槌草土牛膝二味生搗爛取汁灌下又方於病人頂上分左右頭髮用手挽拔之剝然有聲立效又方用馬屁勃吹咽喉中立止又方以布針於病人兩手大拇指側去爪甲一韭葉許刺二分以手捋出血再以白湯口中含漱立愈又方治雙乳蛾用皂莢二片雜草燒鑊鏽即百草霜一錢為末冷水調加清油數點灌下或用燈草燒灰敷上又方治喉間長腫如蒂鍾者鹽煅過雞毛蘸敷上即消不須刺破破則傷人治纏喉風用紅花搗汁服之無濕者浸乾者服治喉閉用膽礬白礬各等分生用研極細末合為一處如咽喉初覺痛時用葦筒將此藥吹入痛處閉口切勿咽下少時口涎下流覺藥力稍緩用溫水漱之如此一二次即消腫痛矣如覺遲已成赤紫如皂莢子大者此藥可日加數次亦能消之白滾湯可用忌生冷之物又方用草藥名喚金鎖匙即馬蹄草以根搗井花水調下立效心病第九治心痛用生地黃取汁搜面作䬪飥或作冷淘隨食多少但忌用鹽久服能療一切久近心痛又方用地上隔年蔥搗汁一杯和香油半盞頻服又方用荔枝核七個燒存性為末酒調服又方用醋一盞加生白礬一小塊如皂莢子大同煎至七分溫服又方用橘皮去白煎飲之又方以新嫩槐枝一握切去兩頭水二鍾煎至一鍾去渣分二次熱服又方治急心痛熱痛用灶中心對鍋底泥為末冷水服若冷痛以酒服亦治顛狂不識人又方七個烏梅八個棗十個杏仁同處搗鹽酒送下七丸兒不害心疼直到老又方治蟲咬心痛香油鹽熬熱服一盞又方治寸白蟲攻心痛用酸石榴東行根二兩糯米三十粒水濃煎空心服又方治噁心痛或連腰臍者鹽如雞子大青布包燒赤投酒中飲當吐惡物治狂言鬼語用蛤蟆一個燒為末酒調服治心恙狂惑用無灰酒二碗真麻油四兩共和勻楊枝二十條逐一條攪一二下換遍楊枝直候油酒相和如膏煎至七分狂者強灌之令熟睡或吐或不吐覺來即醒治發狂欲走著邪祟者用蠶蛻紙作灰酒調服治顛狂不止得之驚憂之極者用絲瓜蒂半兩為末每服一錢井水調一盞投之即大吐後熟睡勿令驚起即效又方治邪狂癲癇不欲眠妄行不休用白雄雞二隻煮熟五味調和作羹食之腹痛第十治絞腸痧用好明礬末滾水調服又方若陰痧腹痛而手足冷有身上紅點以燈草蘸油點火燒之陽痧則腸痛而手足暖以針刺其手指近爪甲處一分半許出血即安仍先自兩臂捋下其惡血令聚指頭刺出血又方治絞腸痧痛不可忍用炒鹽一兩熱湯調服危迫者灌入口中或吐或利腸痛即止又方以手蘸溫水於病人膝腕用力拍打有紫黑處以針刺去惡血即愈又方好酒和薑汁溫服治心腹惡氣口吐清水用艾葉搗汁飲之干煮汁服又方治一切冷氣鬼邪毒氣艾和乾薑末為丸每服三十丸又方治腹痛氣惡用高良薑炒焦酒煎服或用胡椒研碎酒調服治腹脹滿用獨囊大蒜煨熟去皮綿裹塞糞門冷即換亦治關格脹滿大小便不通又方治血脹腹痛用荷葉酒煮服又方用皂莢去子皮弦為細末蜜丸如梧桐子大肉汁下利後忌肉一日治腹中癖塊堅硬如石者取白楊東南枝去青皮細切三斤熬令焦絹袋盛用酒一斗浸祕封三五日每食前暖一盞服之又方治腹中有塊如石痛如刀刺者用商陸根不拘多少搗碎蒸之以新布裹尉痛處冷再換又方治蛔蟲日夜咬人腹內痛不可忍者用苦楝樹白皮二斤去粗皮切碎用水一斗煎至三升去渣於砂鍋內慢火熬成膏每日於五更初用溫酒調下半匙以蟲下為度又方治三蟲搗桃葉絞取汁空心服一盞又方治寸白蟲用酸石榴根一握以水濃煎痹噁心先嚼肉脯次服石榴根汁則蟲盡去腰痛第十一治腰痛用杜仲去皮炒斷絲橘核炒取仁各等分上為末每服二錢入鹽少許食前溫酒調下又方治腰痛並或時挫閃用杜仲破故紙胡桃仁各等分上用酒煎服立效又方用西瓜青為片陰乾為細末以鹽酒空心調服又方用橘核炒去殼酒服或用炒鹽及炒茴香二包不住手更換熱尉又方用茴香莖葉搗汁一碗分三服渣敷痛腫處又方治腰腳軟用二蠶砂炒熱尉之疝氣第十二治小腸疝氣用杉樹子一歲一粒燒研灰用好酒下粒少者一二次服粒多者數次服立愈試有神效又方用橘核曬乾去厚薄殼兩層研細每服五錢用老酒一二盞砂鍋中煮四五沸空心服再用熱酒一二盞罐盛余藥服盡一切下部諸疾皆療又方用荔枝核火燒存性為末酒調服又方用杜茴香一斤以老生薑二斤取自然汁浸茴香一夜約薑汁盡入茴香內以好青鹽二兩同炒赤取出焙燥碾羅為末無灰酒煮糊為丸如梧桐子大每日空心食前服三十丸或五十丸溫酒或米飲下又方治疝氣走入腎囊痛用五月五日採穀樹葉陰乾為末空心酒送下又方用楝樹葉碎切臨發時酒送下又方於腳中趾下中節橫紋上灸二壯愈又方灸外踝穴在兩腳外羅拐骨下一指乃圓骨下灸三壯即愈又云灸內踝穴不再發治男子陰腫赤大如斗人不能治者以馬鞭草搗爛塗之諸氣第十三治諸氣攻刺及感受風寒暑濕飲食所傷中脘痞悶嘔吐吞酸用陳皮洗淨新汲水煎服又方治走注風毒疼痛用芥菜子為末以雞子白調敷又方治走氣疼痛用酸醋淬麩皮炒熱尉之治氣卒奔上呼吸有聲喘急欲死者用韭菜搗汁飲之治氣結聚心下不散用桃樹上不落干桃子三兩為末每服二錢空心溫酒調下又方用生薑和杏仁煎服腳氣第十四治腳氣疼痛槐柳楮桑桃同煎湯洗能消腫住痛先飲酒三杯又方用水紅花煮汁浸之又方每夜用鹽擦腿膝至足甲淹少時卻用熱湯泡洗昔有一人腳氣諸方不效後得此方常用淹洗不再發又方治腳氣腫痛及蠱腫用白花商陸不拘多少切碎酒煮熟連商陸吃若腹肚蠱腫用商陸同米煮粥吃又方治腳氣攻注用水中大螺一個以鹽半匕和殼生搗碎罨於患人臍下一寸三分用寬帛緊繫之仍辦溺器以待其通此遇異人傳授仙方神驗又曾有苦腳氣攻注捶數螺敷兩股上便覺冷氣趨下至足既而亦安又方治腳氣用蘿蔔煎湯洗之或曬乾為末鋪襪內或用楊花如綿絮鋪在襪內尤佳水蠱第十五治十種水蠱病腫滿喘促不得眠用螻蛄五枚干為末食前湯調一錢小便通效又方用商陸根赤者杵碎貼臍心絹帛縛定病自小便出又方治腫脹名丹房奇術用真水銀粉二錢巴豆肉研去油四兩生硫黃一錢上研成餅先以新綿一片鋪臍上次以藥餅當臍掩之外用帛縛之如人行三五里自然瀉下黃水待之三五度除去藥以溫粥補之久患者隔日取水一餅可救二三十人神效又方用赤小豆商陸白者根各等分以雄豬肚一個裝藥在內以蔑簽封其口於瓦罐內煮爛取出去藥乘熱食豬肚宜食五七個見效痰嗽第十六治痰喘用胡桃肉三個生薑三片臨睡細嚼飲湯下就枕又再嚼如前飲湯下即安又方用飛過白礬五倍子等分為末每服二錢以生豬肝火炙熟蘸藥食後臨臥服治痰厥用白礬一兩水一碗煎半碗入蜜少許再煎少時溫服須臾吐如不吐再飲熱水一盞即吐治暴患痰厥不省人事清油一盞灌入喉中須臾逐出痰涎立愈治年高氣喘促用蘿蔔子搗羅為末白湯調五七錢食後服之或用蜜作劑為丸服治咳嗽久患連嗽四五十聲者用生薑汁半合蜜一匙煎熱溫服三服立效又方治氣喘咳嗽用杏仁去皮尖胡桃肉等分研為膏入蜜少許和丸如彈子大每服一二丸食後臨臥細嚼薑湯送下又方治久嗽氣逆諸藥不效用蝙蝠一個去翅足燒令焦為末米飲調下又方治咳嗽用皂莢燒研為末白湯調二錢下又方治壯實人久嗽用罌粟殼去筋膜蜜炙為末蜜湯下又方治咳嗽不止胸膈氣壅滯者取桃仁一升去皮尖麩皮同炒令黃細研貯瓶中以酒五升浸密封三日後每溫服一鍾日進二四服又方用蟬蛻七枚研末粥飲調服又方治久新咳嗽咯血用烏梅一兩罌粟殼一個蜜炙為末每服二錢煎烏梅湯下胃病嘔噎第十七治傷食傷米食用白麵一盞白酒藥兩丸為末炒過滾水調服又方治傷肉食用棠球去核煎服又方用紫蘇濃煎汁加杏仁爛研同服又方用蘆根五兩切碎水三鍾煎一鍾服治乾嘔噦或致手足厥冷用橘皮四兩生薑半斤每服水七鍾煎至三鍾去渣旋溫服治轉食嘔吐用陳蜆殼燒白灰米飲下亦治痰嗽又方用黃柏末熱酒調三五錢食後服又方用生薑一兩切如米大醋漿一碗煮半碗空心和渣呷之又方用千葉白槿樹花陰乾為末陳米湯調送三五口再轉再服之又方治翻胃吐食用真蚌粉每服二錢薑汁米飲調下又方治吐逆不止用真黃丹四兩研細用米醋一盞煎令乾更以火煅通紅候冷為末粟米飯為丸如梧桐子大醋湯吞七丸不拘時服諸血第十八治吐血並鼻中出血用藕節搗汁飲之又方用灶中對鍋底土一合為末新汲水一碗淘取汁和蜜頓服又方用好綿燒灰麵糊為丸酒調下又方治鼻中出血用千葉石榴花焙乾研為末吹入鼻中又方治吐血用側柏葉攤新瓦上焙乾為末每服三錢米飲調食後服一月除根又方用側柏葉陰乾煎湯當茶服之又方治勞心吐血用蓮子二十一粒為末酒調二錢食後服又方用百草霜不拘多少研細吐血糯米飲調下鼻中出血用一字吹入鼻中立效皮肉破處及灸瘡出血糝半錢立止又方治吐血鼻中出血用蘿蔔研汁入鹽服一盞立效或以蘿蔔汁藕汁仰頭滴入鼻中又方治鼻中出血用亂髮燒灰井水調下更吹鼻中又方每發時用亂髮一束捻緊燈火燒出油急塞鼻中又方用大蒜塗腳心即止或以蔥白搗汁入酒少許滴鼻中治失音不能言或咯血或中風用槐花新瓦上炒香熟三更後床上仰臥隨意食之治大小便下血用亂髮燒灰研碎酒調服二錢治腸風下血用炒槐花荊芥穗等分酒調服亦治泄瀉又方用茄蒂燒存性為末米飲調服又方用柏子仁十四枚捻絹囊盛內好酒三鍾煎至八分初服未效加多再服立止非飲酒而致斯疾以艾葉煎湯服效勝他藥又方用椿根白皮北行根者去粗皮酒浸曬乾為末棗肉為丸如梧桐子大每服三十五九淡酒送下又方用豬臟一條控干炒槐花為末填入臟內兩頭線縛定以好醋於瓷器內慢火煮爛切片砂鉢內研爛為丸如梧桐子大每服一二十丸溫酒下又方治大便下血不止用烏梅三兩燒存性為末好醋打米糊為丸如梧桐子大每服七十丸空心飲下治尿血用蛤蟆衣草搗汁空心服或用淡豆豉一撮煎湯服又方用刮竹青一大塊水煎服又方用苧麻根十枚水煮服又方取籬下竹根斷入土多年者不拘多少水淨洗煎湯並服數碗立止又方用茅根煎湯飲多煎頻服為上又方治精竭出血用麩皮炒香煮肥豬肉蘸食之消渴第十九治消渴用田螺五升水一斗浸經宿渴即飲水每日換水浸又方用繅絲湯飲之如無以生絲煮汁飲之又方用五倍子為末以水調方寸匕不拘時服又方用深掘大栝蔞根削去粗皮寸切以水浸一日一換浸五日取出爛研細絹絞汁如作粉法干之水調方寸匕日三四服入牛乳尤好又方用糯稻稈取中段燒灰淋汁飲或不燒煎服亦妙或用生牛乳細呷或生蘿蔔取汁時服少許又方用舊屋上瓦兩片洗淨捶碎以水煮濃汁食後溫服一小盞又方用活蝸牛四十九個以水一碗於瓷器中浸一宿以器蓋之其蝸自沿器上取水溫服之重者不過三服霍亂第二十治霍亂轉筋用皂莢末吹鼻中得嚏即止又方治霍亂轉筋吐瀉用扁豆葉生搗以少醋浸汁服又方治霍亂心腹脹滿疼痛不吐瀉冷汗出氣絶者用極鹹鹽汁三碗熱飲一碗探喉中令吐盡宿食不吐更服吐訖再服三吐乃止此法大勝諸方俗人以為田舍淺近鄙而不用守死而已惜哉又方以淨地掘一潭用新汲水一桶傾在內攪令渾候澄清連飲三五盞立愈大忌飲白米湯又方治霍亂轉筋入腹痛極將死用生薑一兩捶碎酒五錢煮熱服又方治霍亂吐瀉服藥即出無法可治用井水半碗白沸湯半碗相合服之又方治霍亂吐瀉心腹作痛用炒鹽一碗布包頓其胸前並腹肚上尉斗火尉令氣透又以炒鹽尉其背則愈又方治霍亂轉筋欲死惟腹中有暖氣者以鹽納於臍中令實就鹽上灸七壯瘧第二十一治瘧疾用生薑四兩連皮搗碎取汁夜露至曉空心冷服又方用狗蠅一個去翅足以蠟丸之當發日冷酒吞下又方用牛膝草根水煮不時服又方名截瘧丹五月五日取獨蒜不拘多少舂爛入好黃丹再舂乾溼適勻丸如圓眼大曬乾收貯但瘧疾二三發後臨發日雞鳴時以藥一丸略捶碎取井花水面東服之即止不再發又方用雄黃人參神麯各五錢上三味為末五月五日午時用棕尖子七個和為丸如赤豆大病未發時面東服七丸無根水送下熱第二十二治發熱口乾小便赤用甘蔗搗汁服又方用雞子三個白蜜一合和服之又方用天麻子五合研碎水二升煮去半分服四五劑瘥又方治煩熱少睡用小麥作飯食之又方治煩悶用野紅花苗根絞汁飲或水煎服又方用葛根搗汁飲亦治孕婦熱病心悶又方用大豆半升水二升煮濃汁食後服疸第二十三治黃疸黑疸酒疸食疸用豬脂八兩亂頭髮如雞子大二塊同煎臨服絞去發分二服病從小便出又方治黃疸用絲瓜連子燒灰為末因面得病麵湯下因酒得病酒調下數服可愈又方治黑疸急用土瓜根一斤搗碎絞汁溫服當有黃水從小便出未出更服又方治通身黃疸用絲瓜蒂焙乾三四錢為細末每用半字於鼻內吹入一日一度並三日如不愈用黃芩末煎湯下五錢又方治黃疸身眼黃如金色者用東引桃樹根一握如箸大者切細以水一碗煎取半碗空心溫服後三日疸黃離離漸散忌食豬魚肉麩面又方治食勞黃目黃身黃者用皂礬不拘多少放砂鍋子內木炭燒通赤用米醋點赤為末棗肉為丸如梧桐子大每服二三十丸食後薑湯下或治目黃用蒼耳子安舌上出涎又方治酒疸用田螺七枚水養去土捶碎取螺頭切碎以熱酒浸服或用田螺煮服治好飲茶並干茶葉而黃無力用花椒去核為末糊丸如梧桐子大茶湯下一十丸又方用苦草為末和炒熱芝麻不時干服淋濁遺精遺尿第二十四治男子白濁婦女白帶用陳年冬瓜子仁炒為末每服五錢空心米飲調下又方治赤濁用石蓮肉蓮心六兩甘草炙一兩為末每服二錢燈心煎湯調下治諸淋病小便赤澀疼痛用三葉酸漿草洗淨搗汁一盞酒一盞攪勻空心服立通又方治石淋用螻蛄七個鹽二兩同鋪於新瓦上以火焙乾研為末溫酒調下二錢即愈又方治五淋以多年木梳燒存性空心冷水調下男用男梳女用女梳又方用白礬為細末填臍中滴以井水通即去又方治淋痛疼不可忍及砂石淋以大蘿蔔切作一指厚四五片用好蜜蘸淹少時安鐵鏟上慢火炙乾又蘸又炙取盡一二兩蜜翻覆炙令香熟不可焦候冷細嚼以鹽湯送下又方治五淋用苧麻根兩莖切碎以水一碗煎半碗服立通又方治血淋用乾柿燒存性為末米飲調下治精氣虛滑遺泄不禁名玉瑣丹用龍骨蓮花蕊雞頭實烏梅肉各等分上為末用熟山藥去皮為膏和丸如小豆大每服三十丸空心米飲下又方治精滑夢遺及小便後遺瀝名金櫻丸用金櫻子雞頭實各一兩白蓮花蕊龍骨煅各半兩上為末糊丸如梧桐子大每服七八十丸空心鹽酒下又方治精不禁危急者名祕元丹用龍骨酒煮焙乾為末靈砂水飛各一兩砂仁半兩訶子小者熱灰煨取肉半兩上為末糯米糊丸如緑豆大每服三十丸空心溫酒下臨臥白湯下又方名樗樹根丸用良薑三錢燒灰黃柏芍藥各二錢燒灰存性樗樹根皮一兩五錢上為末麵糊丸如梧桐子大每服三十丸空心茶湯下又方治小便淋瀝用葵花一握水煎五七沸服之治夜多小便用純糯米蒸糕一片臨臥炙令軟熱啖之仍以溫酒下不飲酒白湯下多啖愈佳行坐良久待心下空便睡一夜十餘行者當夜即止又方用胡桃慢火煨熟臨臥溫酒同嚼下治睡中遺尿用燕窠中草燒為末水調服又方用雞肫肝一具並腸淨洗燒灰男雌女雄為末酒調服又方用小豆葉搗汁空心溫服一小盞大小便不通第二十五治小便不通用蚯蚓搗碎以冷水濾濃汁服半碗立通又方治腹脹小便不通用栝蔞仁不拘多少為末每服三錢溫酒調下不飲酒以米湯調溫服以通為度又方用鹽填滿臍中艾灸鹽上又方以烏梅肉為末水調二錢服或以麻皮一握細切入甘草少許同煎服又方用炒鹽半斤布裹乘熱尉小腹又方治小便難小腸脹用蔥白三斤細切炒令熱以布裹分作兩處更替尉臍下即通又方用豬膽投熱酒中服立通又方用棕皮毛燒灰存性以薄酒調下即通利纍試甚驗治大小便不通關格不利用皂莢燒研末粥飲下二錢又方用連根蔥一二莖帶土生薑一塊淡豆豉二十一粒鹽一撮同研爛捻作餅子烘熱掩臍中以布絹扎定久之氣透自通不然再換一劑又方用明礬末一撮安臍中冷水滴濕須臾立通治大便不通用豬脂二兩水一碗煮三沸飲汁立通又方治大便祕結至極昏不知人用大田螺二三枚以鹽一小撮和殼生搗碎置病者臍下一寸三分用寬帛緊繫之即大通未效用烏桕木根三寸研爛調水服亦效就研爛敷臍下亦妙又方用獨頭大蒜煨熟去皮綿裹塞糞門內即通又方用不蛀皂莢安瓦上燒著置馬桶內坐上熏糞門自通又方用豬膽一個入好醋少許扎鵝毛管上灌入糞門效又方用蘿蔔子一合研碎皂莢燒研末冷水調二三錢服又方用生麻子不拘多少研爛水調服之又方用蜜四兩置銅勺內微火煎之凝如膏以杖攪之勿令焦乘熱取出急捻作挺子如指長插入糞門內以手按住大便來時去之痔漏第二十六治痔瘡大便下血用槐樹上木耳為末米飲調一錢日三服又方治痔漏用蜣螂不拘多少焙乾為末先用白礬水洗淨貼之又方用槐花炒枳殼去瓤各一兩為細末醋糊為丸如梧桐子大每服二十丸米飲湯空心食前下又方用鳳眼草赤皮蔥椒三味搗渣同煎百滾盛坐盆內令熱氣熏痔但通手洗之如此不過三次愈矣治五痔用蒼耳二兩搗為末食前粥飲調下一錢效又方鼠乳痔用蜘蛛絲纏其上自然消落又方治痔瘡下血用馬齒莧洗去土搗碎絞汁緩火煎成膏停冷每日取少許作丸納所患處又方肛門邊腫硬癢痛不可忍者以白礬三分碎研用熱童便二盞化開洗痔上一日二三次效又方用桃樹根煮汁一日二三次洗之或用鹽湯洗之又方用枳殼燒煙燻一方枳殼煎湯洗一方枳殼為末米飲調服甚效又方用魚腥草其狀三角一邊青山中多有之其葉若荇菜多生佛殿陰處以指捻臭與魚腥相似也取一握煎湯熏洗仍以草挹痔即愈又方治痔瘡用鰻鱺燒熏糞門痔蟲盡死治漏瘡惡水自大腸出用黑牽牛研細去皮細末一分入豬腰子內以線扎青荷葉包火煨熟細嚼溫鹽酒下
