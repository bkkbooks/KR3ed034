body:
  text: 序古有疾醫掌養萬民之疾病凡民之有疾病者分而治之死終則各書其所以而入於醫師於時民故得以壽終而無短折札瘥之患後世王政多缺而醫師之置徒備虛文廛市之氓富羡之室猶能自以其資迎師而荒村窶戶否矣扣首抑心閔閔待斃此一患也草木禽魚之物五石之藥多聚於國都而陬窮壤僻之所即有高資亦不能致錙銖此又一患也時師跖𪾜恆以反劑殺人而茹悲吞螫不敢訟言其非此又一患也豫蓋惻然傷之曩得急救方一本每攜以自隨或以自治或以治人率多徵應間有新得輒從其類附益之其訛舛無驗者則刪黜之遂付梓人刻焉夫人之情一也孰不愛其身亦孰不愛其父母骨肉乎而疾苦無所舒往往束手以斃不得已或竭力於禱禬機禳至蕩資破産而卒莫攸濟也此其於仁孝之心何如哉是方而行庶幾濟於黔細萬分之一要非所以薦於隆富者乎皇明嘉靖二十九年歲次庚戌夏六月望四明芝園主人張時徹著
